<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7fb" />
  <title>SpondFlow Home</title>

  <!-- LIFF SDK: ใช้ได้ถ้าเปิดผ่าน LINE LIFF -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255, 255, 255, 0.82);
      --card-solid: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --muted2: #94a3b8;
      --line: rgba(15, 23, 42, 0.08);
  
      --blue: #4f6df5;
      --blue2: #7c9cff;
      --indigo: #5b5ff0;
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
      --purple: #8b5cf6;
      --cyan: #06b6d4;
      --yellow: #facc15;
  
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.11);
      --shadow-soft: 0 10px 26px rgba(15, 23, 42, 0.08);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-top: env(safe-area-inset-top);
    }
  
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
  
    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(79, 109, 245, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(124, 156, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 45%, #eef3fb 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
    }
  
    body {
      padding: calc(12px + var(--safe-top)) 14px calc(22px + var(--safe-bottom));
      overflow-x: hidden;
    }
  
    button,
    a {
      font-family: inherit;
    }
  
    a {
      color: inherit;
      text-decoration: none;
    }
  
    .app {
      width: min(100%, 720px);
      margin: 0 auto;
    }
  
    /* =========================================================
     * TOP BAR
     * ========================================================= */
  
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
  
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
  
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, #eef2ff, #ffffff);
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.72);
      flex: 0 0 auto;
    
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    .avatar img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      display: block;
    }
    
    .brand-logo-fallback {
      display: none;
      font-size: 24px;
      line-height: 1;
    }
  
    .brand-text {
      min-width: 0;
    }
  
    .brand-title {
      margin: 0;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .brand-subtitle {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .icon-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
      font-size: 20px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
  
    /* =========================================================
       SpondFlow Home Hero - Wide Card Inspired Version
       ========================================================= */
    
    .home-hero {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 18px;
      margin-bottom: 18px;
      color: #ffffff;
      background:
        radial-gradient(circle at 12% 0%, rgba(255,255,255,0.22), transparent 34%),
        radial-gradient(circle at 95% 95%, rgba(255,255,255,0.16), transparent 38%),
        linear-gradient(135deg, #4f6df5 0%, #667cff 48%, #8aa6ff 100%);
      box-shadow: 0 22px 54px rgba(79, 109, 245, 0.26);
    }
    
    .home-hero::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      right: -90px;
      bottom: -96px;
      border-radius: 999px;
      background: rgba(255,255,255,0.13);
    }
    
    .home-hero::after {
      content: "";
      position: absolute;
      width: 150px;
      height: 150px;
      left: -70px;
      top: -66px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
    }
    
    .home-hero-inner {
      position: relative;
      z-index: 1;
    }
    
    .home-hero-head {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .home-hero-badge,
    .home-hero-date {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.26);
      color: rgba(255,255,255,0.96);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.2px;
      white-space: nowrap;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    
    .hero-overview-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    
    .hero-title {
      margin: 0;
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.6px;
      color: #ffffff;
    }
    
    .hero-subtitle {
      margin: 3px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .hero-status-row {
      display: grid;
      grid-template-columns: 0.88fr 0.82fr 1.3fr;
      gap: 8px;
    }
    
    .hero-status-item {
      padding: 13px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.17);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      min-width: 0;
    }
    
    .hero-status-value {
      margin: 0;
      font-size: clamp(18px, 5.2vw, 28px);
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: -0.8px;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .hero-status-label {
      margin: 4px 0 0;
      font-size: 11px;
      font-weight: 750;
      color: rgba(255,255,255,0.68);
      white-space: nowrap;
    }
    
    .hero-user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 24px;
      background: rgba(255,255,255,0.17);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    
    .hero-user-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    
    .hero-profile-avatar {
      width: 46px;
      height: 46px;
      border-radius: 17px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.26);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 950;
      font-size: 18px;
      flex: 0 0 auto;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(255,255,255,0.44);
      position: relative;
    }
    
    .hero-profile-avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      transform: scale(1.03);
    }
    
    .hero-profile-avatar span {
      position: relative;
      z-index: 1;
    }
    
    .hero-profile-info {
      min-width: 0;
    }
    
    .hero-profile-name {
      font-size: 14px;
      font-weight: 950;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .hero-profile-role {
      margin-top: 2px;
      font-size: 11px;
      color: rgba(255,255,255,0.70);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .hero-profile-logout {
      border: 0;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.20);
      color: rgba(255,255,255,0.94);
      font-size: 12px;
      font-weight: 850;
      cursor: pointer;
      flex: 0 0 auto;
    }
    
    @media (max-width: 420px) {
      .home-hero {
        padding: 16px;
        border-radius: 30px;
      }
        
      .hero-title {
        font-size: 21px;
      }
    
      .hero-status-row {
        grid-template-columns: 0.9fr 0.8fr 1.25fr;
        gap: 7px;
      }
    
      .hero-status-item {
        padding: 12px 9px;
        border-radius: 18px;
      }
    
      .hero-status-label {
        font-size: 10px;
      }
    
      .hero-profile-avatar {
        width: 44px;
        height: 44px;
        border-radius: 16px;
      }
    
      .hero-profile-logout {
        padding: 8px 10px;
        font-size: 11px;
      }
    } 
    /* =========================================================
     * SECTION / MENU
     * ========================================================= */
  
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 10px;
    }
  
    .section-title {
      margin: 0;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.3px;
    }
  
    .section-note {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
  
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
  
    .tile {
      position: relative;
      overflow: hidden;
      min-height: 138px;
      padding: 15px;
      border-radius: var(--radius-xl);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }
  
    .tile:active {
      transform: scale(0.975);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }
  
    .tile.disabled {
      opacity: 0.54;
      filter: grayscale(0.2);
    }
  
    .tile-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
  
    .tile-icon {
      width: 46px;
      height: 46px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: linear-gradient(135deg, rgba(79, 109, 245, 0.13), rgba(124, 156, 255, 0.18));
      box-shadow: inset 0 0 0 1px rgba(79, 109, 245, 0.12);
    }
  
    .pill {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }
  
    .tile h3 {
      margin: 14px 0 4px;
      font-size: 16px;
      line-height: 1.18;
      letter-spacing: -0.25px;
    }
  
    .tile p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }
  
    .tile .arrow {
      position: absolute;
      right: 14px;
      bottom: 12px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-weight: 900;
    }

    .bottom-space {
      height: 16px;
    }
      
    /* =========================================================
     * TOAST / LOADING
     * ========================================================= */
  
    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(14px + var(--safe-bottom));
      z-index: 99;
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(17, 24, 39, 0.88);
      color: white;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: 0.22s ease;
    }
  
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  
    .loading {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
  
    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 12px;
      border-radius: 999px;
      border: 3px solid rgba(79, 109, 245, 0.16);
      border-top-color: var(--blue);
      animation: spin 0.8s linear infinite;
    }
  
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  
    /* =========================================================
     * RESPONSIVE
     * ========================================================= */
  
    @media (min-width: 560px) {
      body {
        padding-left: 18px;
        padding-right: 18px;
      }
  
      .grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
   
    /* =========================================================
     * DARK MODE
     * ========================================================= */
  
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101624;
        --card: rgba(30, 41, 59, 0.74);
        --card-solid: #111827;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --muted2: #94a3b8;
        --line: rgba(255, 255, 255, 0.08);
      }
  
      html,
      body {
        background:
          radial-gradient(circle at top left, rgba(79, 109, 245, 0.22), transparent 34%),
          radial-gradient(circle at top right, rgba(124, 156, 255, 0.14), transparent 28%),
          linear-gradient(180deg, #111827 0%, #0f172a 60%, #020617 100%);
      }
  
      .icon-btn,
      .wide-card,
      .user-card,
      .tile {
        border-color: rgba(255, 255, 255, 0.08);
      }
  
      .status-item {
        background: rgba(15, 23, 42, 0.55);
      }
  
      .pill,
      .tile .arrow,
      .logout-btn {
        background: rgba(255, 255, 255, 0.08);
        color: #cbd5e1;
      }
    }    
  </style>
</head>

<body>
  <div id="loading" class="loading">
    <div>
      <div class="spinner"></div>
      <div>กำลังเปิด SpondFlow...</div>
    </div>
  </div>

  <main id="app" class="app" style="display:none;">
    <header class="topbar">
      <div class="brand">
        <div class="avatar brand-avatar">
          <img
            id="brandLogo"
            src="./spondflow-icon.png?v=4"
            alt="SpondFlow"
          />
          <span id="brandLogoFallback" class="brand-logo-fallback">📦</span>
        </div>
        <div class="brand-text">
          <h1 class="brand-title">SpondFlow</h1>
          <p class="brand-subtitle" id="todayText">QuotationBot Home</p>
        </div>
      </div>

      <button class="icon-btn" type="button" onclick="refreshHome()" aria-label="Refresh">↻</button>
    </header>

    <section class="home-hero" id="homeHero">
      <div class="home-hero-inner">
    
        <div class="home-hero-head">
          <div class="home-hero-badge">☕ QUOTATION_BOT · V V COMMUNICATION CO.,LTD.</div>          
        </div>
    
        <div class="hero-overview-head">
          <div>
            <h2 class="hero-title">ภาพรวมวันนี้</h2>
            <p class="hero-subtitle">สรุปออเดอร์และยอดขายจาก SpondFlow</p>
          </div>
        </div>
    
        <div class="hero-status-row">
          <div class="hero-status-item">
            <p class="hero-status-value" id="statOrders">—</p>
            <p class="hero-status-label">ออเดอร์</p>
          </div>
    
          <div class="hero-status-item">
            <p class="hero-status-value" id="statStock">—</p>
            <p class="hero-status-label">เครื่อง</p>
          </div>
    
          <div class="hero-status-item">
            <p class="hero-status-value" id="statPay">—</p>
            <p class="hero-status-label">ยอดเงิน</p>
          </div>
        </div>
    
        <div class="hero-user-card">
          <div class="hero-user-left">
            <div class="hero-profile-avatar">
              <img id="heroProfileImg" alt="Profile">
              <span id="heroProfileInitial">S</span>
            </div>
    
            <div class="hero-profile-info">
              <div class="hero-profile-name" id="heroProfileName">SpondFlow User</div>
              <div class="hero-profile-role" id="heroProfileRole">กำลังตรวจสอบสิทธิ์...</div>
            </div>
          </div>
    
          <button class="hero-profile-logout" type="button" onclick="logoutLine()">
            Close
          </button>
        </div>
    
      </div>
    </section>

    <div class="section-head">
      <h2 class="section-title">เมนูหลัก</h2>
      <div class="section-note">แตะเพื่อเข้าใช้งาน</div>
    </div>

    <section class="grid" id="menuGrid"></section>
    
    <div class="bottom-space"></div>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const CONFIG = {
      liffId: "2009366271-Rb7EZwDn",
  
      gasApiUrl: "https://script.google.com/macros/s/AKfycbw4jAzjWors_9dwQx1bI2RpVzm56icKOcTDYutQZIindgZb3f67MqoduccqgFnM6TzgaA/exec",
  
      links: {
        order: "./order.html",
        stock: "./stock.html",
        quotes: "./quote.html",
        ordersNew: "./orders-new.html",
        payment: "./payment.html",
        sales: "./sales.html",
        products: "./products.html",
        employees: "./employees.html",
        settings: "./settings.html"
      },
  
      requireLiffLogin: true,
      requireInLiffClient: true
    };
  
    const MENUS = [
      {
        key: "order",
        title: "สั่งของ",
        desc: "เลือกสินค้าและส่งฟอร์ม #สั่งของ เข้ากลุ่ม",
        icon: "🛒",
        tag: "LIFF",
        color: "blue",
        href: CONFIG.links.order
      },
      {
        key: "stock",
        title: "ดูสต็อก",
        desc: "เช็กโควต้าและสินค้าพร้อมขาย",
        icon: "📦",
        tag: "Stock",
        color: "green",
        href: CONFIG.links.stock
      },
      {
        key: "quotes",
        title: "ใบเสนอราคา",
        desc: "ดูบิลเปิดค้าง / PDF / รายการใบเสนอราคา",
        icon: "🧾",
        tag: "Quotes",
        color: "purple",
        href: CONFIG.links.quotes
      },
      {
        key: "payment",
        title: "รับชำระ",
        desc: "เช็กหนี้ รับเงิน ตัด IV และดู Payment log",
        icon: "💰",
        tag: "Account",
        color: "orange",
        href: CONFIG.links.payment
      },
      {
        key: "sales",
        title: "ยอดขาย",
        desc: "สรุปยอดขาย รายงาน และภาพรวมรายเดือน",
        icon: "📊",
        tag: "Report",
        color: "cyan",
        href: CONFIG.links.sales
      },
      {
        key: "products",
        title: "สินค้า",
        desc: "Catalog ราคา ประเภทสินค้า และข้อมูลรุ่น",
        icon: "📱",
        tag: "Catalog",
        color: "blue",
        href: CONFIG.links.products
      },
      {
        key: "employees",
        title: "พนักงาน",
        desc: "สิทธิ์ผู้ใช้ Role Scope และข้อมูลพนักงาน",
        icon: "👥",
        tag: "Admin",
        color: "red",
        href: CONFIG.links.employees
      },
      {
        key: "settings",
        title: "ระบบ",
        desc: "ตั้งค่า คลัง ราคา และเครื่องมือดูแลระบบ",
        icon: "⚙️",
        tag: "System",
        color: "gray",
        href: CONFIG.links.settings
      }
    ];
  
    const COLOR_MAP = {
      blue: ["rgba(79,109,245,0.14)", "rgba(124,156,255,0.22)"],
      green: ["rgba(34,197,94,0.14)", "rgba(134,239,172,0.22)"],
      orange: ["rgba(249,115,22,0.14)", "rgba(253,186,116,0.22)"],
      purple: ["rgba(139,92,246,0.14)", "rgba(196,181,253,0.22)"],
      cyan: ["rgba(6,182,212,0.14)", "rgba(125,211,252,0.22)"],
      red: ["rgba(239,68,68,0.13)", "rgba(252,165,165,0.20)"],
      gray: ["rgba(100,116,139,0.12)", "rgba(203,213,225,0.20)"]
    };
  
    let currentUser = {
      name: "Guest",
      role: "browser",
      pictureUrl: "",
      idToken: ""
    };
  
    let currentIdToken = "";
  
    document.addEventListener("DOMContentLoaded", init);
  
    async function init() {
      try {
        setToday();
        renderMenus();
    
        const ok = await initLiffSafe();
        if (!ok) return;
    
        // ✅ เปิดหน้า Interface ก่อน
        showApp();
    
        // ✅ Dashboard โหลดตามมาทีหลัง ไม่ต้องรอก่อนเข้าหน้า
        loadHomeDashboard();
    
      } catch (err) {
        console.warn("[init]", err);
    
        applyHomeDashboard(getEmptyDashboard_());
        showApp();
    
        showToast("เปิดหน้าได้แล้ว แต่โหลดบางข้อมูลไม่สำเร็จครับ");
      }
    }
  
    function showApp() {
      setDisplay("loading", "none");
      setDisplay("app", "block");
    }
  
    function showAccessDenied(title, detail) {
      const loading = document.getElementById("loading");
      const app = document.getElementById("app");
  
      if (app) app.style.display = "none";
  
      loading.style.display = "grid";
      loading.innerHTML = `
        <div style="
          width:min(92vw,420px);
          padding:24px;
          border-radius:28px;
          background:rgba(255,255,255,.84);
          box-shadow:0 18px 45px rgba(15,23,42,.12);
          border:1px solid rgba(255,255,255,.9);
          text-align:center;
          backdrop-filter:blur(18px);
          -webkit-backdrop-filter:blur(18px);
        ">
          <div style="font-size:44px;margin-bottom:8px;">🔒</div>
          <h2 style="margin:0 0 8px;font-size:22px;color:#111827;">${escapeHtml(title || "เข้าใช้งานไม่ได้")}</h2>
          <p style="margin:0;color:#64748b;font-size:14px;line-height:1.55;">
            ${escapeHtml(detail || "กรุณาเปิดผ่าน LINE LIFF และตรวจสอบสิทธิ์พนักงานครับ")}
          </p>
        </div>
      `;
    }
  
    async function initLiffSafe() {
      if (!CONFIG.liffId) {
        showAccessDenied("ยังไม่ได้ตั้งค่า LIFF ID", "กรุณาใส่ LIFF ID ก่อนใช้งานครับ");
        return false;
      }
  
      try {
        await liff.init({ liffId: CONFIG.liffId });
  
        if (CONFIG.requireInLiffClient && !liff.isInClient()) {
          showAccessDenied(
            "กรุณาเปิดผ่าน LINE เท่านั้น",
            "SpondFlow ตอนนี้ล็อกให้ใช้งานเฉพาะใน LIFF เพื่อยืนยันตัวตนพนักงานครับ"
          );
          return false;
        }
  
        if (!liff.isLoggedIn()) {
          if (CONFIG.requireLiffLogin) {
            liff.login({
              redirectUri: window.location.href
            });
            return false;
          }
  
          showAccessDenied("ยังไม่ได้ Login LINE", "กรุณา Login LINE ก่อนเข้าใช้งานครับ");
          return false;
        }
  
        const profile = await liff.getProfile();
        const idToken = liff.getIDToken();
  
        if (!idToken) {
          showAccessDenied(
            "ไม่พบ LINE ID Token",
            "เช็ก LIFF Settings ว่าเปิด scope: profile และ openid แล้วหรือยังครับ"
          );
          return false;
        }
  
        currentIdToken = idToken;
  
        const auth = await callGasJsonp({
          action: "authLiff",
          idToken: idToken
        });
  
        if (!auth || !auth.ok) {
          showAccessDenied(
            "ไม่มีสิทธิ์เข้าใช้งาน",
            (auth && auth.message) || "ไม่พบข้อมูลพนักงานใน Employee_DB ครับ"
          );
          return false;
        }
  
        currentUser = {
          name: auth.displayName || profile.displayName || "LINE User",
          role: auth.role || "User",
          employeeId: auth.employeeId || "",
          fullName: auth.fullName || "",
          scopes: auth.scopes || "",
          pictureUrl: profile.pictureUrl || auth.pictureUrl || "",
          idToken: idToken
        };
  
        updateUserCard(currentUser);
        return true;
  
      } catch (err) {
        console.warn("[initLiffSafe]", err);
  
        showAccessDenied(
          "LIFF init ไม่สำเร็จ",
          err && err.message
            ? err.message
            : "ตรวจสอบ LIFF ID / Endpoint URL / LIFF Settings อีกครั้งครับ"
        );
  
        return false;
      }
    }
  
    async function loadHomeDashboard() {
      setHomeDashboardLoading();
  
      try {
        const res = await callGasJsonp({
          action: "home_dashboard",
          idToken: currentIdToken || currentUser.idToken || ""
        });
  
        if (!res || !res.ok) {
          throw new Error((res && res.message) || (res && res.error) || "home_dashboard failed");
        }
  
        const dashboard = normalizeHomeDashboard_(res);
        applyHomeDashboard(dashboard);
  
      } catch (err) {
        console.warn("[loadHomeDashboard]", err);
  
        applyHomeDashboard(getEmptyDashboard_());
        showToast("Dashboard ยังโหลดไม่ได้ครับ ตอนนี้แสดงค่า 0 ไว้ก่อน");
      }
    }
  
    function normalizeHomeDashboard_(res) {
      const src = res.dashboard || res.data || res.summary || res || {};
      const today = src.today || {};
      const month = src.month || {};
  
      return {
        today: {
          totalOrders: pickNumber_(today, [
            "totalOrders",
            "orderCount",
            "orders",
            "invoiceCount",
            "quoteCount"
          ]),
          totalQty: pickNumber_(today, [
            "totalQty",
            "qty",
            "totalQuantity"
          ]),
          totalAmount: pickNumber_(today, [
            "totalAmount",
            "amount",
            "salesAmount"
          ])
        },
        month: {
          totalQty: pickNumber_(month, [
            "totalQty",
            "qty",
            "totalQuantity"
          ]),
          totalAmount: pickNumber_(month, [
            "totalAmount",
            "amount",
            "salesAmount"
          ])
        }
      };
    }
  
    function getEmptyDashboard_() {
      return {
        today: {
          totalOrders: 0,
          totalQty: 0,
          totalAmount: 0
        },
        month: {
          totalQty: 0,
          totalAmount: 0
        }
      };
    }
  
    function setHomeDashboardLoading() {
      setTextSafe("statOrders", "…");
      setTextSafe("statStock", "…");
      setTextSafe("statPay", "…");
    }
  
    function applyHomeDashboard(data) {
      const today = data.today || {};
  
      setTextSafe("statOrders", fmtInt_(today.totalOrders));
      setTextSafe("statStock", fmtInt_(today.totalQty));
      setTextSafe("statPay", "฿" + fmtMoney_(today.totalAmount));
    }
  
    function callGasJsonp(params) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "__spondFlow_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
  
        const query = new URLSearchParams(params || {});
        query.set("callback", callbackName);
  
        const script = document.createElement("script");
        script.src = CONFIG.gasApiUrl + "?" + query.toString();
  
        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("GAS request timeout"));
        }, 15000);
  
        function cleanup() {
          clearTimeout(timer);
  
          try {
            delete window[callbackName];
          } catch (_) {
            window[callbackName] = undefined;
          }
  
          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
  
        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };
  
        script.onerror = function() {
          cleanup();
          reject(new Error("GAS script load failed"));
        };
  
        document.body.appendChild(script);
      });
    }
  
    function setToday() {
      const d = new Date();
    
      const text = d.toLocaleDateString("th-TH", {
        weekday: "short",
        day: "numeric",
        month: "short",
        year: "numeric"
      });
    
      setTextSafe("todayText", text);
    }
  
    function renderMenus() {
      const grid = document.getElementById("menuGrid");
      if (!grid) return;
  
      grid.innerHTML = "";
  
      MENUS.forEach(function(item) {
        const a = document.createElement("a");
        a.className = "tile";
        a.href = item.href || "#";
        a.dataset.key = item.key;
  
        if (!item.href || item.href === "#") {
          a.classList.add("disabled");
        }
  
        const c = COLOR_MAP[item.color] || COLOR_MAP.blue;
  
        a.innerHTML = `
          <div class="tile-top">
            <div class="tile-icon" style="background:linear-gradient(135deg, ${c[0]}, ${c[1]});">${item.icon}</div>
            <div class="pill">${item.tag}</div>
          </div>
          <h3>${escapeHtml(item.title)}</h3>
          <p>${escapeHtml(item.desc)}</p>
          <div class="arrow">›</div>
        `;
  
        a.addEventListener("click", function(e) {
          if (!item.href || item.href === "#") {
            e.preventDefault();
            showToast("เมนูนี้ยังไม่ได้ผูกหน้าเว็บครับ");
          }
        });
  
        grid.appendChild(a);
      });
    }
  
    function updateUserCard(user) {
      const name = user.name || "Guest";
      const role = user.role || "User";
      const initial = getInitial(name);
      const pictureUrl = user.pictureUrl || "";
    
      // Hero profile ใช้รูป LINE เหมือนเดิม
      setTextSafe("heroProfileName", name);
      setTextSafe("heroProfileRole", role);
      setTextSafe("heroProfileInitial", initial);
    
      const heroImg = document.getElementById("heroProfileImg");
      const heroInitial = document.getElementById("heroProfileInitial");
    
      if (heroImg && pictureUrl) {
        heroImg.src = pictureUrl;
        heroImg.style.display = "block";
    
        if (heroInitial) {
          heroInitial.style.display = "none";
        }
      } else {
        if (heroImg) {
          heroImg.removeAttribute("src");
          heroImg.style.display = "none";
        }
    
        if (heroInitial) {
          heroInitial.style.display = "inline";
          heroInitial.textContent = initial;
        }
      }
    
      // สำคัญ:
      // ไม่ต้อง sync brandLogo กับ pictureUrl แล้ว
      // มุมซ้ายบนจะเป็น icon ระบบ SpondFlow ตลอด
    }
  
    async function refreshHome() {
      showToast("กำลังรีเฟรชหน้าแรกครับ ☕");
      setToday();
      await loadHomeDashboard();
    }
  
    function logoutLine() {
      try {
        if (window.liff && typeof liff.isInClient === "function" && liff.isInClient()) {
          showToast("กำลังปิด SpondFlow ครับ ☕");
  
          setTimeout(function() {
            try {
              liff.closeWindow();
            } catch (e) {
              console.warn("[logoutLine] closeWindow failed:", e);
              fallbackClosePage_();
            }
          }, 250);
  
          return;
        }
  
        if (
          window.liff &&
          typeof liff.isLoggedIn === "function" &&
          liff.isLoggedIn() &&
          typeof liff.logout === "function"
        ) {
          liff.logout();
          showToast("Logout แล้วครับ");
  
          setTimeout(function() {
            location.reload();
          }, 600);
  
          return;
        }
  
        fallbackClosePage_();
  
      } catch (err) {
        console.warn("[logoutLine]", err);
        fallbackClosePage_();
      }
    }
  
    function fallbackClosePage_() {
      showToast("ปิดหน้านี้ไม่ได้อัตโนมัติ ลองกด X มุมขวาบนครับ");
  
      try {
        window.close();
      } catch (e) {}
  
      setTimeout(function() {
        try {
          if (history.length > 1) history.back();
        } catch (e) {}
      }, 500);
    }
  
    function showToast(msg) {
      const el = document.getElementById("toast");
      if (!el) return;
  
      el.textContent = msg;
      el.classList.add("show");
  
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(function() {
        el.classList.remove("show");
      }, 2200);
    }
  
    function pickNumber_(obj, keys) {
      for (let i = 0; i < keys.length; i++) {
        const raw = obj && obj[keys[i]];
  
        if (raw === null || raw === undefined || raw === "") continue;
  
        const cleaned = String(raw).replace(/[฿,\s]/g, "");
        const v = Number(cleaned);
  
        if (!isNaN(v)) return v;
      }
  
      return 0;
    }
  
    function fmtInt_(n) {
      return Number(n || 0).toLocaleString("th-TH", {
        maximumFractionDigits: 0
      });
    }
  
    function fmtMoney_(n) {
      return Number(n || 0).toLocaleString("th-TH", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      });
    }
  
    function getInitial(name) {
      const s = String(name || "").trim();
      if (!s) return "P";
      return s.charAt(0).toUpperCase();
    }
  
    function setTextSafe(id, text) {
      const el = document.getElementById(id);
      if (el) el.textContent = text;
    }
  
    function setDisplay(id, value) {
      const el = document.getElementById(id);
      if (el) el.style.display = value;
    }
  
    function escapeHtml(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function handleBrandLogoError_(img) {
      if (!img) return;
    
      img.style.display = "none";
    
      const fallback = document.getElementById("brandLogoFallback");
      if (fallback) {
        fallback.style.display = "inline-flex";
      }
    }
  </script>
</body>
</html>
