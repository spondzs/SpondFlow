<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7fb" />
  <title>SpondFlow Home</title>

  <!-- LIFF SDK: ใช้ได้ถ้าเปิดผ่าน LINE LIFF -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: rgba(255, 255, 255, 0.82);
      --text: #111827;
      --muted: #6b7280;
      --muted2: #94a3b8;
      --line: rgba(15, 23, 42, 0.08);
  
      --blue: #4f6df5;
      --blue2: #7c9cff;
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
      --purple: #8b5cf6;
      --cyan: #06b6d4;
  
      --radius-xl: 28px;
      --shadow: 0 18px 45px rgba(15, 23, 42, 0.11);
      --shadow-soft: 0 10px 26px rgba(15, 23, 42, 0.08);
  
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-top: env(safe-area-inset-top);
    }
  
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
  
    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(79, 109, 245, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(124, 156, 255, 0.18), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 45%, #eef3fb 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
    }
  
    body {
      padding: calc(12px + var(--safe-top)) 14px calc(22px + var(--safe-bottom));
      overflow-x: hidden;
    }
  
    button,
    a,
    input {
      font-family: inherit;
    }
  
    button {
      cursor: pointer;
    }
  
    a {
      color: inherit;
      text-decoration: none;
    }
  
    .app {
      width: min(100%, 720px);
      margin: 0 auto;
    }
  
    /* =========================================================
     * TOP BAR
     * ========================================================= */
  
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }
  
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
  
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, #eef2ff, #ffffff);
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(255, 255, 255, 0.72);
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
  
    .avatar img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      display: block;
    }
  
    .brand-logo-fallback {
      display: none;
      font-size: 24px;
      line-height: 1;
    }
  
    .brand-text {
      min-width: 0;
    }
  
    .brand-title {
      margin: 0;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .brand-subtitle {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .icon-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
      font-size: 20px;
      border: 1px solid rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
  
    /* =========================================================
     * HOME HERO
     * ========================================================= */
  
    .home-hero {
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 18px;
      margin-bottom: 18px;
      color: #ffffff;
      background:
        radial-gradient(circle at 12% 0%, rgba(255,255,255,0.22), transparent 34%),
        radial-gradient(circle at 95% 95%, rgba(255,255,255,0.16), transparent 38%),
        linear-gradient(135deg, #4f6df5 0%, #667cff 48%, #8aa6ff 100%);
      box-shadow: 0 22px 54px rgba(79, 109, 245, 0.26);
    }
  
    .home-hero::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      right: -90px;
      bottom: -96px;
      border-radius: 999px;
      background: rgba(255,255,255,0.13);
    }
  
    .home-hero::after {
      content: "";
      position: absolute;
      width: 150px;
      height: 150px;
      left: -70px;
      top: -66px;
      border-radius: 999px;
      background: rgba(255,255,255,0.10);
    }
  
    .home-hero-inner {
      position: relative;
      z-index: 1;
    }
  
    .home-hero-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
  
    .home-hero-badge {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.26);
      color: rgba(255,255,255,0.96);
      font-size: 12px;
      font-weight: 850;
      letter-spacing: 0.2px;
      white-space: nowrap;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
  
    .hero-overview-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
  
    .hero-title {
      margin: 0;
      font-size: 22px;
      font-weight: 950;
      letter-spacing: -0.6px;
      color: #ffffff;
    }
  
    .hero-subtitle {
      margin: 3px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .hero-status-row {
      display: grid;
      grid-template-columns: 0.88fr 0.82fr 1.3fr;
      gap: 8px;
    }
  
    .hero-status-item {
      padding: 13px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,0.17);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      min-width: 0;
    }
  
    .hero-status-value {
      margin: 0;
      font-size: clamp(18px, 5.2vw, 28px);
      font-weight: 950;
      line-height: 1.05;
      letter-spacing: -0.8px;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .hero-status-label {
      margin: 4px 0 0;
      font-size: 11px;
      font-weight: 750;
      color: rgba(255,255,255,0.68);
      white-space: nowrap;
    }
  
    .hero-user-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 24px;
      background: rgba(255,255,255,0.17);
      border: 1px solid rgba(255,255,255,0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
  
    .hero-user-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
  
    .hero-profile-avatar {
      width: 46px;
      height: 46px;
      border-radius: 17px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.26);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 950;
      font-size: 18px;
      flex: 0 0 auto;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
      border: 1px solid rgba(255,255,255,0.44);
      position: relative;
    }
  
    .hero-profile-avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      transform: scale(1.03);
    }
  
    .hero-profile-avatar span {
      position: relative;
      z-index: 1;
    }
  
    .hero-profile-info {
      min-width: 0;
    }
  
    .hero-profile-name {
      font-size: 14px;
      font-weight: 950;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .hero-profile-role {
      margin-top: 2px;
      font-size: 11px;
      color: rgba(255,255,255,0.70);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .hero-profile-logout {
      border: 0;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.20);
      color: rgba(255,255,255,0.94);
      font-size: 12px;
      font-weight: 850;
      flex: 0 0 auto;
    }
  
    /* =========================================================
     * HOME MENU
     * ========================================================= */
  
    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      margin: 18px 2px 10px;
    }
  
    .section-title {
      margin: 0;
      font-size: 18px;
      font-weight: 850;
      letter-spacing: -0.3px;
    }
  
    .section-note {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
  
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
  
    .tile {
      position: relative;
      overflow: hidden;
      min-height: 138px;
      padding: 15px;
      border-radius: var(--radius-xl);
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
  
    .tile:active {
      transform: scale(0.975);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
    }
  
    .tile.disabled {
      opacity: 0.54;
      filter: grayscale(0.2);
    }
  
    .tile-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
  
    .tile-icon {
      width: 46px;
      height: 46px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      background: linear-gradient(135deg, rgba(79, 109, 245, 0.13), rgba(124, 156, 255, 0.18));
      box-shadow: inset 0 0 0 1px rgba(79, 109, 245, 0.12);
    }
  
    .pill {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
      white-space: nowrap;
    }
  
    .tile h3 {
      margin: 14px 0 4px;
      font-size: 16px;
      line-height: 1.18;
      letter-spacing: -0.25px;
    }
  
    .tile p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }
  
    .tile .arrow {
      position: absolute;
      right: 14px;
      bottom: 12px;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-weight: 900;
    }
  
    .bottom-space {
      height: 16px;
    }
  
    /* =========================================================
     * ORDER VIEW BASE
     * ========================================================= */
  
    .app.view-order {
      padding-bottom: calc(88px + var(--safe-bottom));
    }
  
    .app.view-order .topbar {
      padding-left: 58px;
    }
  
    .app.view-order #topActionBtn {
      display: none;
    }
  
    .content {
      padding: 2px 0 0;
    }
  
    .order-view {
      padding: 2px 0 104px;
    }
  
    .card {
      margin-bottom: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #ffffff;
      box-shadow: var(--shadow-soft);
    }
  
    .card-title {
      margin-bottom: 12px;
      font-size: 19px;
      font-weight: 950;
      color: #24304f;
      letter-spacing: -0.15px;
    }
  
    .order-back-fab {
      position: fixed;
      left: 18px;
      top: calc(14px + var(--safe-top));
      z-index: 80;
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
      color: #1f2937;
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      display: grid;
      place-items: center;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
      border: 1px solid rgba(255,255,255,0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
  
    .order-back-fab:active {
      transform: scale(0.94);
    }
  
    /* =========================================================
     * ORDER FORM / CUSTOMER / PRODUCT
     * ========================================================= */
  
    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 14px;
      border: 1px solid rgba(15, 23, 42, 0.10);
      border-radius: 18px;
      background: #ffffff;
    }
  
    .order-product-card .search-wrap {
      min-height: 46px;
      border-radius: 16px;
    }
  
    .search-icon {
      color: #8b95a7;
      font-size: 18px;
      font-weight: 900;
    }
  
    .order-product-card .search-icon {
      font-size: 16px;
    }
  
    .search-input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      font-weight: 650;
    }
  
    .order-product-card .search-input {
      font-size: 15px;
    }
  
    .search-input::placeholder {
      color: #a0a7b4;
      font-weight: 600;
    }
  
    .clear-btn {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: #f1f5f9;
      color: #64748b;
      font-size: 22px;
      line-height: 1;
    }
  
    .customer-picker {
      position: relative;
    }
  
    .dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 30;
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid rgba(15, 23, 42, 0.10);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 42px rgba(31, 41, 55, 0.18);
    }
  
    .customer-option {
      padding: 13px 14px;
      border-bottom: 1px solid #eef2f7;
    }
  
    .customer-option:last-child {
      border-bottom: 0;
    }
  
    .customer-name {
      font-size: 15px;
      font-weight: 950;
      color: #1f2937;
    }
  
    .customer-meta {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }
  
    .selected-customer {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #dbeafe;
      color: #334155;
      font-size: 14px;
    }
  
    .selected-customer b {
      color: #1e3a8a;
    }
  
    .brand-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin: 12px -2px 0;
      padding: 2px 2px 4px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
  
    .brand-tabs::-webkit-scrollbar {
      display: none;
    }
  
    .brand-tab {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 0 14px;
      border: 1px solid rgba(79, 109, 245, 0.14);
      border-radius: 999px;
      background: rgba(255,255,255,0.72);
      color: #64748b;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
    }
  
    .brand-tab.active {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #ffffff;
      border-color: rgba(255,255,255,0.42);
      box-shadow: 0 10px 22px rgba(79, 109, 245, 0.20);
    }
  
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }
  
    .product-card {
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #fbfcff);
    }
  
    .product-card.selected {
      border-color: #c7d2fe;
      background: linear-gradient(180deg, #ffffff, #f7f9ff);
      box-shadow: 0 8px 18px rgba(79, 109, 245, 0.08);
    }
  
    .product-card:active {
      transform: scale(0.992);
    }
  
    .product-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }
  
    .product-main {
      flex: 1;
      min-width: 0;
    }
  
    .product-name {
      font-size: 16px;
      font-weight: 950;
      color: #111827;
      line-height: 1.35;
      word-break: break-word;
    }
  
    .product-price {
      white-space: nowrap;
      font-size: 14px;
      font-weight: 950;
      color: #315bc8;
    }
  
    .product-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
  
    .stock-meta {
      flex: 1;
      font-size: 13px;
      color: #64748b;
      line-height: 1.45;
    }
  
    .stock-meta b {
      color: #111827;
    }
  
    .qty-stepper {
      display: grid;
      grid-template-columns: 42px 48px 42px;
      height: 42px;
      overflow: hidden;
      border: 1px solid #d8e0f2;
      border-radius: 999px;
      background: #f8fbff;
      flex: 0 0 auto;
    }
  
    .qty-btn {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-size: 24px;
      font-weight: 950;
      line-height: 42px;
      padding: 0;
    }
  
    .qty-btn:disabled {
      opacity: 0.28;
    }
  
    .qty-num {
      display: block;
      height: 42px;
      line-height: 42px;
      text-align: center;
      font-size: 18px;
      font-weight: 950;
      color: #315bc8;
    }
  
    .empty {
      padding: 22px 14px;
      border: 1px dashed #d5dcea;
      border-radius: 18px;
      background: #fbfcff;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }
  
    /* =========================================================
     * FLOATING CART BAR
     * ========================================================= */
  
    .order-cart-bar {
      position: fixed;
      left: 50%;
      bottom: calc(14px + var(--safe-bottom));
      z-index: 9990;
      width: min(720px, calc(100vw - 28px));
      transform: translateX(-50%) translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
  
    .order-cart-bar.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      pointer-events: auto;
    }
  
    .order-cart-button {
      width: 100%;
      min-height: 62px;
      border: 0;
      border-radius: 22px;
      padding: 0 18px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 12px;
      background:
        radial-gradient(circle at 92% 0%, rgba(255,255,255,0.26), transparent 28%),
        linear-gradient(135deg, var(--blue), var(--blue2));
      color: #ffffff;
      box-shadow: 0 18px 42px rgba(79, 109, 245, 0.30);
      pointer-events: auto;
    }
  
    .order-cart-count {
      min-width: 34px;
      height: 34px;
      padding: 0 9px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.96);
      color: var(--blue);
      font-size: 17px;
      font-weight: 950;
    }
  
    .order-cart-title {
      text-align: left;
      font-size: 16px;
      font-weight: 950;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .order-cart-total {
      font-size: 16px;
      font-weight: 950;
      white-space: nowrap;
    }
  
    /* =========================================================
     * REVIEW MODAL
     * ========================================================= */
  
    .review-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 99980;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(15, 23, 42, 0.42);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  
    .review-modal-backdrop.show {
      display: flex;
    }
  
    .review-modal {
      width: min(520px, 100%);
      max-height: calc(100vh - 96px);
      overflow-y: auto;
      border-radius: 30px;
      background:
        radial-gradient(circle at 100% 0%, rgba(124,156,255,0.14), transparent 30%),
        #ffffff;

    /* =========================================================
     * TOAST / LOADING
     * ========================================================= */
  
    .toast {
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: calc(14px + var(--safe-bottom));
      z-index: 99990;
      max-width: 720px;
      margin: 0 auto;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(17, 24, 39, 0.88);
      color: white;
      font-size: 13px;
      line-height: 1.4;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
      transition: 0.22s ease;
    }
  
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  
    .toast.success {
      background: rgba(22, 163, 74, 0.96);
    }
  
    .toast.warn {
      background: rgba(180, 83, 9, 0.96);
    }
  
    .toast.error {
      background: rgba(220, 38, 38, 0.96);
    }
  
    .loading {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
    }
  
    .spinner {
      width: 34px;
      height: 34px;
      margin: 0 auto 12px;
      border-radius: 999px;
      border: 3px solid rgba(79, 109, 245, 0.16);
      border-top-color: var(--blue);
      animation: spin 0.8s linear infinite;
    }
  
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    };

      const loading = document.getElementById("loading");

      if (app) app.style.display = "none";
  
      loading.style.display = "grid";
      loading.innerHTML = `

          border-radius:28px;

          box-shadow:0 18px 45px rgba(15,23,42,.12);

          backdrop-filter:blur(18px);
          -webkit-backdrop-filter:blur(18px);

          <h2 style="margin:0 0 8px;font-size:22px;color:#111827;">${escapeHtml(title || "เข้าใช้งานไม่ได้")}</h2>
          <p style="margin:0;color:#64748b;font-size:14px;line-height:1.55;">
            ${escapeHtml(detail || "กรุณาเปิดผ่าน LINE LIFF และตรวจสอบสิทธิ์พนักงานครับ")}
          </p>
        </div>
      `;
    }
  
    async function initLiffSafe() {
      if (!CONFIG.liffId) {
        showAccessDenied("ยังไม่ได้ตั้งค่า LIFF ID", "กรุณาใส่ LIFF ID ก่อนใช้งานครับ");
        return false;
      }
  
      try {
        await liff.init({ liffId: CONFIG.liffId });
  
        if (CONFIG.requireInLiffClient && !liff.isInClient()) {
          showAccessDenied(
            "กรุณาเปิดผ่าน LINE เท่านั้น",
            "SpondFlow ตอนนี้ล็อกให้ใช้งานเฉพาะใน LIFF เพื่อยืนยันตัวตนพนักงานครับ"
          );
          return false;
        }
  
        if (!liff.isLoggedIn()) {
          if (CONFIG.requireLiffLogin) {
            liff.login({
              redirectUri: window.location.href
            });
            return false;
          }
  
          showAccessDenied("ยังไม่ได้ Login LINE", "กรุณา Login LINE ก่อนเข้าใช้งานครับ");
          return false;
        }
  
        const profile = await liff.getProfile();
        const idToken = liff.getIDToken();
  
        if (!idToken) {
          showAccessDenied(
            "ไม่พบ LINE ID Token",
            "เช็ก LIFF Settings ว่าเปิด scope: profile และ openid แล้วหรือยังครับ"
          );
          return false;
        }
  
        currentIdToken = idToken;

        liffReady = true;
  
        const auth = await callGasJsonp({
          action: "authLiff",
          idToken: idToken
        });
  
        if (!auth || !auth.ok) {
          showAccessDenied(
            "ไม่มีสิทธิ์เข้าใช้งาน",
            (auth && auth.message) || "ไม่พบข้อมูลพนักงานใน Employee_DB ครับ"
          );
          return false;
        }
  
        currentUser = {
          name: auth.displayName || profile.displayName || "LINE User",
          role: auth.role || "User",
          employeeId: auth.employeeId || "",
          fullName: auth.fullName || "",
          scopes: auth.scopes || "",
          pictureUrl: profile.pictureUrl || auth.pictureUrl || "",
          lineUserId: profile.userId || auth.lineUserId || "",
          idToken: idToken
        };
  
        updateUserCard(currentUser);
        return true;
  
      } catch (err) {
        console.warn("[initLiffSafe]", err);
  
        showAccessDenied(
          "LIFF init ไม่สำเร็จ",
          err && err.message
            ? err.message
            : "ตรวจสอบ LIFF ID / Endpoint URL / LIFF Settings อีกครั้งครับ"
        );
  
        return false;
      }
    }

        return;

    function renderHomeView_() {
      const root = document.getElementById("viewRoot");

      const app = document.getElementById("app");

        app.classList.remove("view-stock");
        app.classList.remove("view-quote");

      root.innerHTML = "";
      root.appendChild(tpl.content.cloneNode(true));
    
      setAppTopbar_("SpondFlow", getTodayText_(), "↻");
    
      renderMenus();
      updateUserCard(currentUser);
    
      if (homeDashboardData) {
        applyHomeDashboard(homeDashboardData);
      } else {
        setHomeDashboardLoading();
      }
    }
    
    function renderOrderView_() {
      const root = document.getElementById("viewRoot");
      const tpl = document.getElementById("orderViewTemplate");
      if (!root || !tpl) return;

      const app = document.getElementById("app");
      if (app) {
        app.classList.add("view-order");
        app.classList.remove("view-stock");
        app.classList.remove("view-quote");
      }
    
      root.innerHTML = "";
      root.appendChild(tpl.content.cloneNode(true));
    
      setAppTopbar_("สร้างฟอร์ม #สั่งของ", "เลือกสินค้าแล้วส่งเข้ากลุ่ม", "‹");
    
      bindOrderEvents_();
      orderRenderAll_();
      ensureOrderDataLoaded_();
      orderPreloadCustomers_();
    }

    function renderStockView_() {
      const root = document.getElementById("viewRoot");
      const tpl = document.getElementById("stockViewTemplate");
      if (!root || !tpl) return;
    
      const app = document.getElementById("app");
      if (app) {

        app.classList.remove("view-order");
        app.classList.remove("view-quote");

      root.innerHTML = "";

    function renderQuoteView_() {

      const tpl = document.getElementById("quoteViewTemplate");

    function callGasJsonp(params) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "__spondFlow_" + Date.now() + "_" + Math.floor(Math.random() * 100000);
  
        const query = new URLSearchParams(params || {});
        query.set("callback", callbackName);
  
        const script = document.createElement("script");
        script.src = CONFIG.gasApiUrl + "?" + query.toString();
  
        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("GAS request timeout"));
        }, 15000);
  
        function cleanup() {
          clearTimeout(timer);
  
          try {
            delete window[callbackName];
          } catch (_) {
            window[callbackName] = undefined;
          }
  
          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }
  
        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };
  
        script.onerror = function() {
          cleanup();
          reject(new Error("GAS script load failed"));
        };
  
        document.body.appendChild(script);
      });
    }

    function pickNumber_(obj, keys) {

        if (raw === null || raw === undefined || raw === "") continue;
  
        const cleaned = String(raw).replace(/[฿,\s]/g, "");
        const v = Number(cleaned);
  
        if (!isNaN(v)) return v;
      }
  
      return 0;
    }

    function orderUnwrapList_(data, keys) {
      if (Array.isArray(data)) return data;
      if (!data) return [];

        if (Array.isArray(data[k])) return data[k];
      }
    
      if (data.ok === true) {
        if (Array.isArray(data.items)) return data.items;
        if (Array.isArray(data.data)) return data.data;
      }
    
      return [];
    }

    function orderNormalizeBrandKey_(brand) {
      const b = String(brand || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "");

      return b;
    }
    
    function orderInferBrand_(modelBase) {
      const s = String(modelBase || "").trim().toLowerCase();
    
      if (s.indexOf("iqoo") > -1) return "iqoo";
      if (s.indexOf("vivo") > -1) return "vivo";
    
      // fallback จาก pattern มือถือ vivo ปัจจุบัน
      if (/^(y|v|x|z)\d/i.test(String(modelBase || "").trim())) return "vivo";
    
      return "อื่น ๆ";
    }
    
    function orderBrandLabel_(brand) {
      const b = String(brand || "").trim();
    
      if (!b || b === "all") return "ทั้งหมด";
    
      const key = orderNormalizeBrandKey_(b);
      if (key === "iqoo") return "iQOO";
      if (key === "vivo") return "vivo";
    
      return b;
    }
    
    function orderCollectBrands_(items) {
      const map = {};
    
      (items || []).forEach(function(item) {
        const raw = String(item.brand || "").trim();
        if (!raw) return;
    
        const key = orderNormalizeBrandKey_(raw);
        if (!key) return;
    
        // เก็บ label ให้สวย
        if (key === "iqoo") map[key] = "iQOO";
        else if (key === "vivo") map[key] = "vivo";
        else map[key] = raw;
      });
    
      const priority = {
        vivo: 1,
        iqoo: 2
      };
    
      const brands = Object.keys(map).sort(function(a, b) {
        const pa = priority[a] || 50;
        const pb = priority[b] || 50;
    
        if (pa !== pb) return pa - pb;
        return String(map[a]).localeCompare(String(map[b]), "th");
      }).map(function(key) {
        return map[key];
      });
    
      brands.unshift("all");
      return brands;
    }
    
    function orderGetFilteredItems_() {

      return (st.catalog.items || []).filter(function(item) {
        const itemBrandKey = orderNormalizeBrandKey_(item.brand || "");
    
        const searchText = [
          item.brand,
          item.displayName,
          item.modelBase,
          item.orderLine,
          item.series,
          item.color,
          item.colorName,
          item.colorTH
        ].join(" ").toLowerCase();
    
        const brandOk = activeBrandKey === "all" || itemBrandKey === activeBrandKey;
        const keywordOk = !keyword || searchText.indexOf(keyword) > -1;
        const stockOk = orderAvailableQty_(item) > 0;
    
        return brandOk && keywordOk && stockOk;
      });
    }

        st.catalog.brands = orderCollectBrands_(st.catalog.items);

        const hasActive = (st.catalog.brands || []).some(function(b) {

    function orderNormalizeProduct_(x) {
      x = x || {};
    
      const quota = x.quota || x.stock || {};
      const priceModes = x.priceModes || x.prices || {};
    
      const modelBase = String(x.modelBase || x.ModelBase || x.model || "").trim();
      const series = String(x.series || x.Series || "").trim();
      const displayName = String(x.displayName || x.name || modelBase).trim();
    
      const rawBrand = String(
        x.brand ||
        x.Brand ||
        x["แบรนด์"] ||
        x.brandName ||
        x.BrandName ||
        ""
      ).trim();
    
      const brand = rawBrand || orderInferBrand_(modelBase);
    
      const orderLine = String(
        x.orderLine ||
        x.OrderLine ||
        x.orderLineTemplate ||
        x.commandLine ||
        ""
      ).trim();
    
      const remainQuota = Number(
        x.remainQuota ||
        x.available ||
        x.qtyAvailable ||
        quota.RemainQuota ||
        x.RemainQuota ||
        0
      );
    
      return {
        modelBase: modelBase,
        brand: brand,
        displayName: displayName || modelBase,
        orderLine: orderNormalizeOrderLineBase_(orderLine || orderBuildOrderLineFromModelBase_(modelBase)),
        series: series,
        color: String(x.color || x.ColorName || x.colorName || x.ColorTH || "").trim(),
        colorName: String(x.colorName || x.ColorName || "").trim(),
        colorTH: String(x.colorTH || x.ColorTH || "").trim(),
        price: Number(x.price || x.priceWholesale || x.PriceWholesale || priceModes.wholesale || 0),
        quota: {
          RemainQuota: remainQuota,
          RemainQuota2: Number(quota.RemainQuota2 || x.RemainQuota2 || 0),
          RemainQuota3: Number(quota.RemainQuota3 || x.RemainQuota3 || 0)
        }
      };
    }

    
    function orderNormalizeOrderLineBase_(line) {
      return String(line || "")
        .replace(/\s+x\s*$/i, "")
        .replace(/\s+x\s*\d+\s*$/i, "")
        .replace(/\s+/g, " ")
        .trim();
    }
    
    function orderBuildOrderLineFromModelBase_(modelBase) {
      let s = String(modelBase || "").trim();
    
      s = s
        .replace(/^vivo\s*[-–]\s*/i, "")
        .replace(/^iqoo\s*[-–]\s*/i, "iQOO ")
        .replace(/\(\s*(\d+)\s*[+\/]\s*(\d+)\s*GB\s*\)/ig, "$1+$2")
        .replace(/\(\s*(\d+)\s*[+\/]\s*(\d+)\s*\)/ig, "$1+$2")
        .replace(/\(\s*demo\s*\)/ig, "")
        .replace(/\bdemo\b/ig, "")
        .replace(/\s+/g, " ")
        .trim();
    
      return s;
    }
    
    function orderCartItems_() {
      return Object.keys(appState.order.cart).map(function(k) {
        return appState.order.cart[k];
      });
    }
    
    function orderAvailableQty_(product) {
      const st = appState.order;
      const q = product && product.quota ? product.quota : {};
      return Number(q[st.warehouseKey] || 0);
    }
    
    function orderGetCartQty_(modelBase) {
      const it = appState.order.cart[String(modelBase || "")];
      return it ? Number(it.qty || 0) : 0;
    }
    
    function orderSetCartQty_(product, qty) {
      const st = appState.order;
    
      if (!product || !product.modelBase) return;
    
      const modelBase = String(product.modelBase || "");
      let nextQty = Math.max(0, Number(qty || 0));
      const maxQty = orderAvailableQty_(product);
    
      if (maxQty <= 0 && nextQty > 0) {
        showToast("รุ่นนี้ไม่มีโควต้าพร้อมขาย", "warn", 1800);
        return;
      }
    
      if (maxQty > 0 && nextQty > maxQty) {
        nextQty = maxQty;
        showToast("ปรับเป็นจำนวนสูงสุดที่มีแล้ว", "warn", 1500);
      }
    
      if (nextQty <= 0) {
        delete st.cart[modelBase];
      } else {
        st.cart[modelBase] = {
          modelBase: product.modelBase,
          displayName: product.displayName || product.modelBase,
          orderLine: orderNormalizeOrderLineBase_(product.orderLine || product.modelBase),
          qty: nextQty,
          price: Number(product.price || 0),
          warehouseKey: st.warehouseKey
        };
      }
    
      orderRenderAll_();
    }
    
    function orderTotalQty_() {
      return orderCartItems_().reduce(function(sum, x) {
        return sum + Number(x.qty || 0);
      }, 0);
    }
    
    function orderCustomerLabel_() {
      const c = appState.order.customer.selected || {};
      return String(c.name || c.customerNo || "").trim();
    }
    
    function orderCanBuild_() {
      return !!(orderCustomerLabel_() && orderCartItems_().length);
    }
    
    function orderBuildText_() {
      const name = orderCustomerLabel_();
      const items = orderCartItems_();
    
      const lines = [];
    
      lines.push("#สั่งของ " + name);
      lines.push("");
    
      items.forEach(function(it) {
        const baseLine = orderNormalizeOrderLineBase_(it.orderLine || it.modelBase || "");
        lines.push(baseLine + " x" + Number(it.qty || 0));
      });
    
      return lines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
    }
    
    function orderRenderAll_() {
      orderRenderSelectedCustomer_();
      orderRenderBrandTabs_();
      orderRenderCatalog_();
      orderRenderFloatingCart_();
    }
    
    function orderRenderSelectedCustomer_() {
      const st = appState.order;
      const box = $("selectedCustomerBox");
      const input = $("customerSearch");
      const clearBtn = $("clearCustomerBtn");
      const c = st.customer.selected;
    
      if (clearBtn && input) {
        clearBtn.style.display = String(input.value || "").trim() ? "" : "none";
      }
    
      if (!box) return;
    
      if (!c) {
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }
    
      box.style.display = "";
      box.innerHTML =
        "<b>" + escapeHtml(c.name || "-") + "</b><br>" +
        "รหัสลูกค้า: " + escapeHtml(c.customerNo || "-") +
        (c.phone ? " | โทร: " + escapeHtml(c.phone) : "");
    }
    
    function orderRenderCustomerDropdown_() {
      const st = appState.order;
      const box = $("customerDropdown");
      if (!box) return;
    
      const keyword = String(st.customer.keyword || "").trim();
      const options = st.customer.options || [];
    
      if (!st.customer.dropdownOpen || !keyword) {
        box.style.display = "none";
        box.innerHTML = "";
        return;
      }
    
      box.style.display = "";
    
      if (st.customer.loading) {
        box.innerHTML = '<div class="customer-option"><div class="customer-meta">กำลังค้นหา...</div></div>';
        return;
      }
    
      if (!options.length) {
        box.innerHTML = '<div class="customer-option"><div class="customer-meta">ไม่พบลูกค้าที่ค้นหา</div></div>';
        return;
      }
    
      let html = "";
    
      options.forEach(function(c, idx) {
        html +=
          '<div class="customer-option" data-idx="' + idx + '">' +
            '<div class="customer-name">' + escapeHtml(c.name || "-") + "</div>" +
            '<div class="customer-meta">' +
              "รหัสลูกค้า: " + escapeHtml(c.customerNo || "-") +
              (c.phone ? " | โทร: " + escapeHtml(c.phone) : "") +
            "</div>" +
          "</div>";
      });
    
      box.innerHTML = html;
    
      Array.prototype.forEach.call(box.querySelectorAll(".customer-option"), function(el) {
        el.addEventListener("click", function() {
          const idx = Number(this.getAttribute("data-idx"));
          const c = appState.order.customer.options[idx];
          if (!c) return;
    
          appState.order.customer.selected = c;
          appState.order.customer.keyword = c.name || "";
    
          const input = $("customerSearch");
          if (input) input.value = c.name || "";
    
          appState.order.customer.dropdownOpen = false;
    
          orderRenderAll_();
          orderRenderCustomerDropdown_();
          showToast("เลือกลูกค้าแล้ว", "success", 1000);
        });
      });
    }
    
    function orderRenderCatalog_() {
      const st = appState.order;
      const box = $("catalogList");
      if (!box) return;
    
      if (st.catalog.loading) {
        box.innerHTML = '<div class="empty">กำลังโหลดสินค้า...</div>';
        return;
      }
    
      const items = orderGetFilteredItems_();
    
      if (!items.length) {
        box.innerHTML = '<div class="empty">ไม่พบสินค้าที่พร้อมขายในเงื่อนไขนี้ครับ</div>';
        return;
      }
    
      let html = "";
    
      items.forEach(function(p, idx) {
        const q = orderGetCartQty_(p.modelBase);
        const available = orderAvailableQty_(p);
        const selected = q > 0 ? " selected" : "";
        const minusDisabled = q <= 0 ? " disabled" : "";
        const plusDisabled = available <= 0 || q >= available ? " disabled" : "";
    
        html +=
          '<div class="product-card' + selected + '" data-idx="' + idx + '">' +
            '<div class="product-head">' +
              '<div class="product-main">' +
                '<div class="product-name">' + escapeHtml(p.displayName || p.modelBase || "-") + "</div>" +
              "</div>" +
              '<div class="product-price">' + (p.price ? orderFmt_(p.price) + " ฿" : "") + "</div>" +
            "</div>" +
    
            '<div class="product-foot">' +
              '<div class="stock-meta">' +
                "แบรนด์: <b>" + escapeHtml(orderBrandLabel_(p.brand)) + "</b> · " +
                "พร้อมขาย: <b>" + orderFmt_(available) + "</b>" +
              "</div>" +
    
              '<div class="qty-stepper">' +
                '<button class="qty-btn minus-btn" type="button"' + minusDisabled + ">−</button>" +
                '<span class="qty-num">' + orderFmt_(q) + "</span>" +
                '<button class="qty-btn plus-btn" type="button"' + plusDisabled + ">+</button>" +
              "</div>" +
            "</div>" +
          "</div>";
      });
    
      box.innerHTML = html;
    
      Array.prototype.forEach.call(box.querySelectorAll(".product-card"), function(el) {
        const idx = Number(el.getAttribute("data-idx"));
        const product = items[idx];
        if (!product) return;
    
        const minus = el.querySelector(".minus-btn");
        const plus = el.querySelector(".plus-btn");
    
        if (minus) {
          minus.addEventListener("click", function() {
            orderSetCartQty_(product, orderGetCartQty_(product.modelBase) - 1);
          });
        }
    
        if (plus) {
          plus.addEventListener("click", function() {
            orderSetCartQty_(product, orderGetCartQty_(product.modelBase) + 1);
          });
        }
      });
    }


    function orderRenderBrandTabs_() {
      const st = appState.order;
      const box = $("orderBrandTabs");
      if (!box) return;
    
      const brands = st.catalog.brands && st.catalog.brands.length
        ? st.catalog.brands
        : ["all"];
    
      const activeKey = orderNormalizeBrandKey_(st.catalog.activeBrand || "all");
      const hasActive = brands.some(function(b) {
        return orderNormalizeBrandKey_(b) === activeKey;
      });
    
      if (!hasActive) {
        st.catalog.activeBrand = "all";
      }
    
      let html = "";
    
      brands.forEach(function(brand) {
        const brandKey = orderNormalizeBrandKey_(brand);
        const currentKey = orderNormalizeBrandKey_(st.catalog.activeBrand || "all");
        const active = brandKey === currentKey ? " active" : "";
    
        html +=
          '<button class="brand-tab' + active + '" type="button" data-brand="' + escapeHtml(brand) + '">' +
            escapeHtml(orderBrandLabel_(brand)) +
          "</button>";
      });
    
      box.innerHTML = html;
    }
    
    function orderRenderReview_() {
      const box = $("reviewBox");
      const preview = $("commandPreview");
      if (!box) return;
    
      const c = appState.order.customer.selected;
      const items = orderCartItems_();
    
      const customerHtml = c
        ? '<div class="review-main">' + escapeHtml(c.name || "-") + "</div>" +
          '<div class="review-sub">รหัสลูกค้า: ' + escapeHtml(c.customerNo || "-") + "</div>"
        : '<div class="review-sub">ยังไม่ได้เลือกลูกค้า</div>';
    
      let itemHtml = "";
    
      if (!items.length) {
        itemHtml = '<div class="review-sub">ยังไม่มีรายการสินค้า</div>';
      } else {
        items.slice(0, 4).forEach(function(it) {
          itemHtml +=
            '<div class="review-item">' +
              '<div class="review-item-name">' + escapeHtml(it.orderLine || it.modelBase || "-") + "</div>" +
              '<div class="review-item-right">x' + orderFmt_(it.qty || 0) + "</div>" +
            "</div>";
        });
    
        if (items.length > 4) {
          itemHtml += '<div class="review-sub">และอีก ' + orderFmt_(items.length - 4) + " รายการ</div>";
        }
      }
    
      box.innerHTML =
        '<div class="review-section">' +
          '<div class="review-label">ลูกค้า</div>' +
          customerHtml +
        "</div>" +
    
        '<div class="review-section">' +
          '<div class="review-label">รายการที่เลือก</div>' +
          itemHtml +
        "</div>" +
    
        '<div class="review-section">' +
          '<div class="review-label">รวม</div>' +
          '<div class="review-main">' + orderFmt_(orderTotalQty_()) + " เครื่อง</div>" +
        "</div>";
    
      if (preview) {
        preview.style.display = "none";
        preview.textContent = orderCanBuild_() ? orderBuildText_() : "";
      }
    }
    
    function orderRenderButtons_() {
      orderRenderFloatingCart_();
    }
    
    function ensureOrderReviewModal_() {
      if ($("reviewModalBackdrop")) return;
    
      const wrap = document.createElement("div");
      wrap.id = "reviewModalBackdrop";
      wrap.className = "review-modal-backdrop";
    
      wrap.innerHTML =
        '<div class="review-modal">' +
          '<div class="modal-head">' +
            '<div class="modal-icon">📋</div>' +
            '<div class="modal-title-wrap">' +
              '<div class="modal-title">ตรวจสอบก่อนส่ง</div>' +
              '<div class="modal-sub">ข้อความที่จะส่งเข้ากลุ่ม</div>' +
            "</div>" +
            '<button id="modalCloseBtn" class="modal-close" type="button">×</button>' +
          "</div>" +
    
          '<div id="modalCommandText" class="modal-command"></div>' +
       
          '<div class="modal-actions">' +
            '<button id="modalCopyBtn" class="modal-btn copy" type="button">คัดลอก</button>' +
            '<button id="modalSendBtn" class="modal-btn send" type="button">ส่ง / เลือกปลายทาง</button>' +
          "</div>" +
        "</div>";
    
      document.body.appendChild(wrap);
    
      $("modalCloseBtn").addEventListener("click", closeOrderReviewModal_);
      $("modalCopyBtn").addEventListener("click", copyOrderText_);
      
      $("modalSendBtn").addEventListener("click", function() {
        if (typeof sendOrderToChat_ === "function") {
          sendOrderToChat_();
          return;
        }
      
        showToast("ยังไม่พบฟังก์ชันส่งข้อความครับ", "error", 1800);
      });
      
      wrap.addEventListener("click", function(e) {
        if (e.target === wrap) closeOrderReviewModal_();
      });
    }

    function orderBuildReviewHtml_() {
      const text = orderBuildText_();
      const lines = String(text || "").split("\n");
    
      let html = "";
    
      lines.forEach(function(line, idx) {
        const clean = String(line || "").trim();
    
        if (!clean) {
          html += '<span class="modal-command-empty"></span>';
          return;
        }
    
        if (idx === 0) {
          html +=
            '<span class="modal-command-line modal-command-title">' +
              escapeHtml(clean) +
            "</span>";
          return;
        }
    
        html +=
          '<span class="modal-command-line">' +
            escapeHtml(clean) +
          "</span>";
      });
    
      return html || '<span class="modal-command-line">ไม่มีข้อความ</span>';
    }
    
    function openOrderReviewModal_() {
      if (!orderCanBuild_()) {
        showToast("เลือกลูกค้าและสินค้าให้ครบก่อนครับ", "warn", 1600);
        return;
      }
    
      ensureOrderReviewModal_();
    
      const commandBox = $("modalCommandText");
    
      if (commandBox) {
        if (typeof orderBuildReviewHtml_ === "function") {
          commandBox.innerHTML = orderBuildReviewHtml_();
        } else {
          commandBox.textContent = orderBuildText_();
        }
      }
    
      const modalSub = document.querySelector(".modal-sub");
      if (modalSub) {
        modalSub.textContent = orderFmt_(orderTotalQty_()) + " เครื่อง · ตรวจสอบก่อนส่ง";
      }
    
      const customerEl = $("modalCustomerName");
      if (customerEl) {
        customerEl.textContent = orderCustomerLabel_() || "-";
      }
    
      const totalEl = $("modalTotalQty");
      if (totalEl) {
        totalEl.textContent = orderFmt_(orderTotalQty_()) + " เครื่อง";
      }
    
      const backdrop = $("reviewModalBackdrop");
      if (backdrop) {
        backdrop.classList.add("show");
      } else {
        showToast("เปิดกล่องตรวจสอบไม่ได้ครับ", "error", 1800);
      }
    }
    
    function closeOrderReviewModal_() {
      const el = $("reviewModalBackdrop");
      if (el) el.classList.remove("show");
    }

    function orderResetAfterSubmit_(opt) {
      opt = opt || {};
    
      const st = appState.order;
    
      // เคลียร์รายการสินค้า / จำนวนที่เลือก
      st.cart = {};
    
      // เคลียร์คำค้นสินค้า
      st.catalog.keyword = "";
    
      const catalogInput = $("catalogSearch");
      if (catalogInput) {
        catalogInput.value = "";
      }
    
      // ค่า default: ยังเก็บลูกค้าไว้ เผื่อสั่งต่อให้ร้านเดิม
      // ถ้าอยากให้ส่งเสร็จแล้วเคลียร์ลูกค้าด้วย ให้เรียก { clearCustomer: true }
      if (opt.clearCustomer) {
        st.customer.keyword = "";
        st.customer.selected = null;
        st.customer.options = [];
        st.customer.dropdownOpen = false;
    
        const customerInput = $("customerSearch");
        if (customerInput) {
          customerInput.value = "";
        }
      }
    
      closeOrderReviewModal_();
      orderRenderAll_();
    
      setTimeout(function() {
        const catalogInputAfter = $("catalogSearch");
        if (catalogInputAfter) {
          catalogInputAfter.focus();
        }
      }, 120);
    }
    
    function fallbackCopy_(text) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      document.body.appendChild(ta);
      ta.select();
    
      let ok = false;
      try {
        ok = document.execCommand("copy");
      } catch (e) {
        ok = false;
      }
    
      document.body.removeChild(ta);
      return ok;
    }
    
    async function copyOrderText_() {
      if (!orderCanBuild_()) {
        showToast("เลือกลูกค้าและสินค้าให้ครบก่อนครับ", "warn", 1600);
        return;
      }
    
      const text = orderBuildText_();
    
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const ok = fallbackCopy_(text);
          if (!ok) throw new Error("copy failed");
        }
    
        showToast("คัดลอกแล้วครับ", "success", 1200);
    
      } catch (e) {
        const ok2 = fallbackCopy_(text);
    
        if (ok2) {
          showToast("คัดลอกแล้วครับ", "success", 1200);
        } else {
          showToast("คัดลอกไม่สำเร็จ กดค้างที่ข้อความเพื่อคัดลอกแทนครับ", "error", 2400);
        }
      }
    }

    function getLiffContextType_() {
      try {
        if (!window.liff || !liffReady || typeof liff.getContext !== "function") {
          return "external";
        }
    
        const ctx = liff.getContext() || {};
        return String(ctx.type || "external");
      } catch (err) {
        console.warn("[getLiffContextType_]", err);
        return "external";
      }
    }
    
    function canUseShareTargetPicker_() {
      try {
        if (!window.liff || !liffReady) return false;
        if (typeof liff.shareTargetPicker !== "function") return false;
    
        if (typeof liff.isApiAvailable === "function") {
          return !!liff.isApiAvailable("shareTargetPicker");
        }
    
        return true;
      } catch (err) {
        console.warn("[canUseShareTargetPicker_]", err);
        return false;
      }
    }
    
    function buildOrderMessageObjects_() {
      return [
        {
          type: "text",
          text: orderBuildText_()
        }
      ];
    }
    
    async function sendOrderByShareTargetPicker_() {
      const result = await liff.shareTargetPicker(buildOrderMessageObjects_(), {
        isMultiple: true
      });
    
      // result undefined = user กดยกเลิก / ปิด picker
      if (!result) {
        showToast("ยกเลิกการเลือกปลายทางครับ", "warn", 1600);
        return false;
      }
    
      if (result.status === "success") {
        showToast("ส่งผ่านตัวเลือกปลายทางแล้วครับ", "success", 1400);
        return true;
      }
    
      showToast("ยังไม่ได้ส่งข้อความครับ", "warn", 1600);
      return false;
    }
    
    async function sendOrderToCurrentChat_() {
      await liff.sendMessages(buildOrderMessageObjects_());
      showToast("ส่งเข้าห้องแชทแล้วครับ", "success", 1400);
      return true;
    }
    
    async function sendOrderToChat_() {
      if (!orderCanBuild_()) {
        showToast("เลือกลูกค้าและสินค้าให้ครบก่อนครับ", "warn", 1600);
        return;
      }
    
      if (!window.liff || !liffReady) {
        await copyOrderText_();
        showToast("LIFF ไม่พร้อม จึงคัดลอกข้อความให้แทนครับ", "warn", 2200);
        return;
      }
    
      const modalSendBtn = $("modalSendBtn");
      const oldText = modalSendBtn ? modalSendBtn.textContent : "";
    
      try {
        if (modalSendBtn) {
          modalSendBtn.disabled = true;
          modalSendBtn.textContent = "กำลังส่ง...";
        }
    
        const contextType = getLiffContextType_();
    
        // group / room = ส่งกลับห้องเดิม
        if (contextType === "group" || contextType === "room") {
          await sendOrderToCurrentChat_();
        
          orderResetAfterSubmit_({
            clearCustomer: false
          });
        
          showToast("ส่งออเดอร์เรียบร้อย", "success", 1800);
          return;
        }
    
        // utou = 1:1 กับบอท → เปิดตัวเลือกปลายทาง
        if (contextType === "utou") {
          if (canUseShareTargetPicker_()) {
            const sent = await sendOrderByShareTargetPicker_();
    
            if (sent) {
              orderResetAfterSubmit_({
                clearCustomer: false
              });
            
              showToast("ส่งออเดอร์เรียบร้อย", "success", 1800);
            }
            
            return;
          }
    
          await copyOrderText_();
          showToast("เครื่องนี้ยังเปิดตัวเลือกปลายทางไม่ได้ จึงคัดลอกให้แทนครับ", "warn", 2400);
          return;

    async function stockReload_() {
      const st = appState.stock;
    
      st.loading = true;
      stockRenderAll_();
    
      try {
        const data = await callGasJsonp({
          action: ORDER_ACTIONS.catalog,
          idToken: currentIdToken || currentUser.idToken || "",
          lineUserId: currentUser.lineUserId || "",
          keyword: "",
          brand: "all",
          warehouseKey: "all",

        if (data && data.ok === false) {
          throw new Error(data.error || data.message || "โหลดสต็อกไม่สำเร็จ");
        }
    
        const list = orderUnwrapList_(data, ["stockItems", "catalog", "items", "products", "data", "results"]);
    
        st.items = stockAggregateItems_(
          list.map(stockNormalizeItem_).filter(function(x) {
            return !!(x && x.modelBase);
          })
        );
    
        st.brands = stockCollectBrands_(st.items);
        st.initialized = true;
    
        const activeKey = orderNormalizeBrandKey_(st.activeBrand || "all");
        const hasActive = st.brands.some(function(b) {
          return orderNormalizeBrandKey_(b) === activeKey;
        });
    
        if (!hasActive) st.activeBrand = "all";
    
      } catch (err) {
        console.error("[stockReload_]", err);
        showToast(err.message || "โหลดสต็อกไม่สำเร็จ", "error", 2400);
    
        st.items = [];
        st.brands = ["all"];
    
      } finally {
        st.loading = false;
    
        if (currentView === "stock") {
          stockRenderAll_();
        }
      }
    }
    
    function stockNormalizeItem_(x) {
      x = x || {};
    
      const modelBase = String(x.modelBase || x.ModelBase || x.model || "").trim();
      const warehouseKey = String(x.warehouseKey || x.WarehouseKey || "RemainQuota").trim();
    
      const rawBrand = String(
        x.brand ||
        x.Brand ||
        x["แบรนด์"] ||
        x.brandName ||
        x.BrandName ||
        ""
      ).trim();
    
      const brand = rawBrand || orderInferBrand_(modelBase);
    
      const remain = Number(
        x.remainQuota ||
        x.available ||
        x.qtyAvailable ||
        x.RemainQuota ||
        0
      );
    
      const quota = {
        RemainQuota: 0,
        RemainQuota2: 0,
        RemainQuota3: 0
      };
    
      if (warehouseKey === "RemainQuota" || warehouseKey === "RemainQuota2" || warehouseKey === "RemainQuota3") {
        quota[warehouseKey] = remain;
      } else {
        quota.RemainQuota = Number(x.RemainQuota || 0);
        quota.RemainQuota2 = Number(x.RemainQuota2 || 0);
        quota.RemainQuota3 = Number(x.RemainQuota3 || 0);
      }
    
      return {
        id: String(x.id || modelBase + "|" + warehouseKey),
        modelBase: modelBase,
        brand: brand,
        series: String(x.series || x.Series || "").trim(),
        displayName: String(x.displayName || x.name || modelBase).trim(),
        color: String(x.color || x.colorName || x.ColorName || x.ColorTH || "").trim(),
        price: Number(x.price || x.priceWholesale || x.PriceWholesale || 0),
        retailPrice: Number(x.retailPrice || x.priceRetail || x.PriceRetail || 0),
        quota: quota
      };
    }
    
    function stockAggregateItems_(items) {
      const map = {};
    
      (items || []).forEach(function(item) {
        const key = String(item.modelBase || "").trim();
        if (!key) return;
    
        if (!map[key]) {
          map[key] = {
            modelBase: item.modelBase,
            brand: item.brand,
            series: item.series,
            displayName: item.displayName || item.modelBase,
            color: item.color,
            price: item.price || 0,
            retailPrice: item.retailPrice || 0,
            quota: {
              RemainQuota: 0,
              RemainQuota2: 0,
              RemainQuota3: 0
            }
          };
        }
    
        map[key].quota.RemainQuota += Number(item.quota.RemainQuota || 0);
        map[key].quota.RemainQuota2 += Number(item.quota.RemainQuota2 || 0);
        map[key].quota.RemainQuota3 += Number(item.quota.RemainQuota3 || 0);
    
        if (!map[key].price && item.price) map[key].price = item.price;
        if (!map[key].retailPrice && item.retailPrice) map[key].retailPrice = item.retailPrice;
        if (!map[key].brand && item.brand) map[key].brand = item.brand;
      });
    
      return Object.keys(map).map(function(k) {
        return map[k];
      }).sort(function(a, b) {
        return String(a.displayName || "").localeCompare(String(b.displayName || ""), "th", {
          numeric: true,
          sensitivity: "base"
        });
      });
    }
    
    function stockCollectBrands_(items) {
      if (typeof orderCollectBrands_ === "function") {
        return orderCollectBrands_(items || []);
      }
    
      const map = {};
      (items || []).forEach(function(item) {
        const b = String(item.brand || "").trim();
        if (b) map[b] = true;
      });
    
      const brands = Object.keys(map).sort();
      brands.unshift("all");
      return brands;
    }
    
    function stockQty_(item, warehouseKey) {
      const q = item && item.quota ? item.quota : {};
    
      if (!warehouseKey || warehouseKey === "all") {
        return Number(q.RemainQuota || 0) +
          Number(q.RemainQuota2 || 0) +
          Number(q.RemainQuota3 || 0);
      }
    
      return Number(q[warehouseKey] || 0);
    }
    
    function stockGetFilteredItems_() {
      const st = appState.stock;
    
      const keyword = String(st.keyword || "").trim().toLowerCase();
      const activeBrandKey = orderNormalizeBrandKey_(st.activeBrand || "all");
      const warehouseKey = st.warehouseKey || "all";
    
      return (st.items || []).filter(function(item) {

        const searchText = [
          item.brand,
          item.displayName,
          item.modelBase,
          item.series,
          item.color
        ].join(" ").toLowerCase();
    
        const brandOk = activeBrandKey === "all" || brandKey === activeBrandKey;
        const keywordOk = !keyword || searchText.indexOf(keyword) > -1;
        const qtyOk = stockQty_(item, warehouseKey) > 0;
    
        return brandOk && keywordOk && qtyOk;
      });
    }

    function stockBuildShareText_() {

      const brandLabel = orderBrandLabel_(st.activeBrand || "all");
      const warehouseLabel = stockWarehouseLabel_(st.warehouseKey || "all");
    
      const now = new Date().toLocaleString("th-TH", {
        day: "numeric",
        month: "short",
        hour: "2-digit",
        minute: "2-digit"
      });
    
      const maxLines = 40;
      const lines = [];
    
      lines.push("📦 สต็อกพร้อมขาย " + brandLabel);
      lines.push("คลัง: " + warehouseLabel);
      lines.push("อัปเดต: " + now);
      lines.push("");
    
      items.slice(0, maxLines).forEach(function(item) {
        const qty = stockQty_(item, st.warehouseKey);
    
        const prices = [];
    
        if (Number(item.price || 0)) {
          prices.push("ส่ง ฿" + orderFmt_(item.price));
        }
    
        if (Number(item.retailPrice || 0)) {
          prices.push("ปลีก ฿" + orderFmt_(item.retailPrice));
        }
    
        const priceText = prices.length ? " · " + prices.join(" / ") : "";
    
        lines.push(

          " — " +
          orderFmt_(qty) +
          " เครื่อง" +

      if (items.length > maxLines) {
        lines.push("");
        lines.push("และอีก " + orderFmt_(items.length - maxLines) + " รุ่น");
      }
    
      return lines.join("\n").trim();

        if (currentView === "quote") {
          quoteRenderAll_();
        }
      }
    }
    
    function quoteFmt_(n) {
      try {
        return Number(n || 0).toLocaleString("th-TH", {
          maximumFractionDigits: 0
        });
      } catch (e) {
        return String(n || 0);
      }
    }
    
    function quoteFmtDate_(value) {
      if (!value) return "-";
    
      try {
        const d = new Date(value);
        if (isNaN(d.getTime())) return "-";
    
        return d.toLocaleDateString("th-TH", {
          day: "numeric",
          month: "short",
          year: "2-digit"
        });
      } catch (e) {
        return "-";
      }
    }
    
    function quoteGetFilteredItems_() {
      const st = appState.quote;
      const keyword = String(st.keyword || "").trim().toLowerCase();
    
      return (st.items || []).filter(function(x) {
        if (!keyword) return true;
    
        return [
          x.quoteNo,
          x.customerName,
          x.customerNo,
          x.salesName
        ].join(" ").toLowerCase().indexOf(keyword) > -1;
      });
    }
    
    function quoteRenderAll_() {
      quoteRenderSummary_();
      quoteRenderList_();
    }
    
    function quoteRenderSummary_() {
      const items = quoteGetFilteredItems_();
    
      const qty = items.reduce(function(sum, x) {
        return sum + Number(x.sumQty || 0);
      }, 0);
    
      const amount = items.reduce(function(sum, x) {
        return sum + Number(x.sumTotal || 0);
      }, 0);
    
      setTextSafe("quoteSummaryCount", quoteFmt_(items.length));
      setTextSafe("quoteSummaryQty", quoteFmt_(qty));
      setTextSafe("quoteSummaryAmount", "฿" + quoteFmt_(amount));
    }
    
    function quoteRenderList_() {
      const st = appState.quote;
      const box = $("quoteList");
      if (!box) return;
    
      box.innerHTML = "";
    
      if (st.loading) {
        box.innerHTML = '<div class="empty">กำลังโหลดใบเสนอราคา...</div>';
        return;
      }
    
      const items = quoteGetFilteredItems_();
    
      if (!items.length) {
        box.innerHTML = '<div class="empty">ไม่มีใบเสนอราคาเปิดค้างครับ</div>';
        return;
      }
    
      items.forEach(function(x) {
        const card = document.createElement("article");
        card.className = "quote-card";
    
        const quoteNo = String(x.quoteNo || "").trim();
        const customer = String(x.customerName || x.customerNo || "-").trim();
        const pdfUrl = String(x.pdfUrl || "").trim();
        const canCancel = !!x.canCancel;
    
        let itemHtml = "";
    
        if (Array.isArray(x.items) && x.items.length) {
          itemHtml += '<div class="quote-items">';
    
          x.items.slice(0, 5).forEach(function(it) {
            itemHtml +=
              '<div class="quote-item-row">' +
                '<div class="quote-item-name">' + escapeHtml(it.modelBase || "-") + "</div>" +
                '<div class="quote-item-qty">' + quoteFmt_(it.qty || 0) + " เครื่อง</div>" +
              "</div>";
          });
    
          if (x.items.length > 5) {
            itemHtml +=
              '<div class="quote-item-row">' +
                '<div class="quote-item-name">และอีก ' + quoteFmt_(x.items.length - 5) + " รายการ</div>" +
                '<div class="quote-item-qty">ดูใน PDF</div>' +
              "</div>";
          }
    
          itemHtml += "</div>";
        }
    
        const cancelNote = canCancel
          ? ""
          : '<div class="quote-cancel-note">' + escapeHtml(x.cancelDeniedReason || "ยกเลิกได้เฉพาะผู้เปิดรายการหรือ admin") + "</div>";
    
        card.innerHTML =
          '<div class="quote-card-head">' +
            '<div class="quote-customer">' +
              '<div class="quote-customer-name">' + escapeHtml(customer) + "</div>" +
              '<div class="quote-no">' + escapeHtml(quoteNo || "-") + "</div>" +
            "</div>" +
            '<div class="quote-total">' +
              "฿" + quoteFmt_(x.sumTotal || 0) +
              '<div class="quote-total-sub">' + quoteFmt_(x.sumQty || 0) + " เครื่อง</div>" +
            "</div>" +
          "</div>" +
    
          '<div class="quote-meta">' +
            '<span class="quote-chip sales">Sales: ' + escapeHtml(x.salesName || "-") + "</span>" +
            '<span class="quote-chip">' + escapeHtml(quoteFmtDate_(x.date)) + "</span>" +
          "</div>" +
    
          itemHtml +
    
          '<div class="quote-actions">' +
            '<button class="quote-action-btn pdf" type="button"' + (pdfUrl ? "" : " disabled") + ">ดู PDF</button>" +
            '<button class="quote-action-btn share" type="button">แชร์</button>' +
            '<button class="quote-action-btn cancel" type="button"' + (canCancel ? "" : " disabled") + ">ยกเลิก</button>" +
          "</div>" +
          cancelNote;
    
        const pdfBtn = card.querySelector(".quote-action-btn.pdf");
        const shareBtn = card.querySelector(".quote-action-btn.share");
        const cancelBtn = card.querySelector(".quote-action-btn.cancel");
    
        if (pdfBtn) {
          pdfBtn.onclick = function() {
            quoteOpenPdf_(pdfUrl);
          };
        }
    
        if (shareBtn) {
          shareBtn.onclick = function() {
            quoteShare_(quoteNo, shareBtn);
          };
        }
    
        if (cancelBtn && canCancel) {
          cancelBtn.onclick = function() {
            quoteCancel_(quoteNo, cancelBtn);
          };
        }
    
        box.appendChild(card);
      });
    }
    
    function quoteOpenPdf_(url) {
      url = String(url || "").trim();
    
      if (!url) {
        showToast("ใบนี้ยังไม่มี PDF URL ครับ", "warn", 1800);
        return;
      }
    
      try {
        if (window.liff && liffReady && typeof liff.openWindow === "function") {
          liff.openWindow({
            url: url,
            external: true
          });
          return;
        }
      } catch (err) {
        console.warn("[quoteOpenPdf_]", err);
      }
    
      window.open(url, "_blank");
    }
    
    function quoteBuildFallbackText_(quoteNo) {
      quoteNo = String(quoteNo || "").trim();
      const item = (appState.quote.items || []).find(function(x) {
        return String(x.quoteNo || "").trim() === quoteNo;
      });
    
      if (!item) return quoteNo;
    
      return [
        "ใบเสนอราคา: " + quoteNo,
        "ลูกค้า: " + (item.customerName || item.customerNo || "-"),
        "ยอดรวม: ฿" + quoteFmt_(item.sumTotal || 0),
        item.pdfUrl ? "PDF: " + item.pdfUrl : ""
      ].filter(Boolean).join("\n");
    }
    
    async function quoteShare_(quoteNo, btn) {
      quoteNo = String(quoteNo || "").trim();
    
      if (!quoteNo) {
        showToast("ไม่พบเลขใบเสนอราคา", "warn", 1600);
        return;
      }
    
      const oldText = btn ? btn.textContent : "";
    
      try {
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Loading...";
        }
    
        const messages = await callGasJsonp({
          action: QUOTE_ACTIONS.sharePayload,
          idToken: currentIdToken || currentUser.idToken || "",
          lineUserId: currentUser.lineUserId || "",
          quoteNo: quoteNo
        });
    
        if (messages && messages.ok === false) {
          throw new Error(messages.error || messages.message || "โหลด payload ไม่สำเร็จ");
        }
    
        if (!Array.isArray(messages) || !messages.length) {
          throw new Error("GAS ไม่ได้ส่งข้อความกลับมา");
        }
    
        if (
          !window.liff ||
          !liffReady ||
          typeof liff.shareTargetPicker !== "function" ||
          (typeof canUseShareTargetPicker_ === "function" && !canUseShareTargetPicker_())
        ) {
          const text = quoteBuildFallbackText_(quoteNo);
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            fallbackCopy_(text);
          }
    
          showToast("SharePicker ไม่พร้อม จึงคัดลอกข้อมูลให้แทนครับ", "warn", 2200);
          return;
        }
    
        const result = await liff.shareTargetPicker(messages, {
          isMultiple: true
        });
    
        if (result && result.status === "success") {
          showToast("แชร์ใบเสนอราคาแล้วครับ", "success", 1600);
          return;
        }
    
        showToast("ยกเลิกการแชร์ครับ", "warn", 1400);
    
      } catch (err) {
        console.error("[quoteShare_]", err);
        showToast(err.message || "แชร์ใบเสนอราคาไม่สำเร็จ", "error", 2400);
    
      } finally {
        if (btn) {
          btn.disabled = false;
          btn.textContent = oldText || "แชร์";
        }
      }
    }

    function ensureQuoteCancelModal_() {
      if ($("quoteCancelBackdrop")) return;
    
      const wrap = document.createElement("div");
      wrap.id = "quoteCancelBackdrop";
      wrap.className = "quote-cancel-backdrop";
    
      wrap.innerHTML =
        '<div class="quote-cancel-modal">' +
          '<div class="quote-cancel-head">' +
            '<div class="quote-cancel-icon">!</div>' +
            '<div class="quote-cancel-title-wrap">' +
              '<div class="quote-cancel-title">ยืนยันยกเลิกใบเสนอราคา</div>' +
              '<div class="quote-cancel-sub">ระบบจะคืนโควต้าและเปลี่ยนสถานะเป็น CANCELLED</div>' +
            "</div>" +
            '<button id="quoteCancelCloseBtn" class="quote-cancel-close" type="button">×</button>' +
          "</div>" +
    
          '<div class="quote-cancel-body">' +
            '<div class="quote-cancel-info">' +
              '<div id="quoteCancelCustomer" class="quote-cancel-customer">-</div>' +
              '<div id="quoteCancelQuoteNo" class="quote-cancel-quote">-</div>' +
              '<div class="quote-cancel-meta">' +
                '<span id="quoteCancelQty" class="quote-cancel-chip">- เครื่อง</span>' +
                '<span id="quoteCancelAmount" class="quote-cancel-chip">฿0</span>' +
                '<span id="quoteCancelSales" class="quote-cancel-chip">Sales: -</span>' +
              "</div>" +
            "</div>" +
    
            '<div class="quote-cancel-warning">' +
              "การยกเลิกนี้จะคืนโควต้าสินค้ากลับคลัง และรายการนี้จะหายจากหน้าใบเสนอราคาเปิดค้าง" +
            "</div>" +
    
            '<div class="quote-cancel-reason-wrap">' +
              '<div class="quote-cancel-reason-label">เหตุผลการยกเลิก (ไม่บังคับ)</div>' +
              '<textarea id="quoteCancelReason" class="quote-cancel-reason" placeholder="เช่น ลูกค้ายกเลิก / เปิดบิลผิด / แก้จำนวนสินค้า"></textarea>' +
            "</div>" +
          "</div>" +
    
          '<div class="quote-cancel-actions">' +
            '<button id="quoteCancelKeepBtn" class="quote-cancel-btn keep" type="button">ยังไม่ยกเลิก</button>' +
            '<button id="quoteCancelConfirmBtn" class="quote-cancel-btn danger" type="button">ยืนยันยกเลิก</button>' +
          "</div>" +
        "</div>";
    
      document.body.appendChild(wrap);
    
      $("quoteCancelCloseBtn").addEventListener("click", closeQuoteCancelModal_);
      $("quoteCancelKeepBtn").addEventListener("click", closeQuoteCancelModal_);
    
      $("quoteCancelConfirmBtn").addEventListener("click", function() {
        quotePerformCancel_();
      });
    
      wrap.addEventListener("click", function(e) {
        if (e.target === wrap) closeQuoteCancelModal_();
      });
    }
    
    function openQuoteCancelModal_(quoteNo, btn) {
      quoteNo = String(quoteNo || "").trim();
    
      const item = (appState.quote.items || []).find(function(x) {
        return String(x.quoteNo || "").trim() === quoteNo;
      });
    
      if (!item) {
        showToast("ไม่พบข้อมูลใบเสนอราคานี้ครับ", "error", 1800);
        return;
      }
    
      ensureQuoteCancelModal_();
    
      QUOTE_CANCEL_CTX = {
        quoteNo: quoteNo,
        button: btn || null
      };
    
      setTextSafe("quoteCancelCustomer", item.customerName || item.customerNo || "-");
      setTextSafe("quoteCancelQuoteNo", quoteNo || "-");
      setTextSafe("quoteCancelQty", quoteFmt_(item.sumQty || 0) + " เครื่อง");
      setTextSafe("quoteCancelAmount", "฿" + quoteFmt_(item.sumTotal || 0));
      setTextSafe("quoteCancelSales", "Sales: " + (item.salesName || "-"));
    
      const reason = $("quoteCancelReason");
      if (reason) reason.value = "";
    
      const confirmBtn = $("quoteCancelConfirmBtn");
      if (confirmBtn) {
        confirmBtn.disabled = false;
        confirmBtn.textContent = "ยืนยันยกเลิก";
      }
    
      const backdrop = $("quoteCancelBackdrop");
      if (backdrop) backdrop.classList.add("show");
    }
    
    function closeQuoteCancelModal_() {
      const backdrop = $("quoteCancelBackdrop");
      if (backdrop) backdrop.classList.remove("show");
    
      QUOTE_CANCEL_CTX = null;
    }
    
    function quoteCancel_(quoteNo, btn) {
      quoteNo = String(quoteNo || "").trim();
    
      if (!quoteNo) {
        showToast("ไม่พบเลขใบเสนอราคา", "warn", 1600);
        return;
      }
    
      openQuoteCancelModal_(quoteNo, btn);
    }

    async function quotePerformCancel_() {
      if (!QUOTE_CANCEL_CTX) {
        showToast("ไม่พบข้อมูลรายการที่จะยกเลิกครับ", "warn", 1800);
        closeQuoteCancelModal_();
        return;
      }

      const ctx = QUOTE_CANCEL_CTX;
      const quoteNo = String(ctx.quoteNo || "").trim();
      const originalBtn = ctx.button || null;
    
      if (!quoteNo) {
        showToast("ไม่พบเลขใบเสนอราคา", "warn", 1600);
        return;
      }
    
      const confirmBtn = $("quoteCancelConfirmBtn");
      const reasonEl = $("quoteCancelReason");
      const reason = String(reasonEl && reasonEl.value || "").trim();
    
      const oldText = originalBtn ? originalBtn.textContent : "";
    
      try {
        if (confirmBtn) {
          confirmBtn.disabled = true;
          confirmBtn.textContent = "กำลังยกเลิก...";
        }
    
        if (originalBtn) {
          originalBtn.disabled = true;
          originalBtn.textContent = "กำลังยกเลิก...";
        }
    
        const res = await callGasJsonp({
          action: QUOTE_ACTIONS.cancel,
          idToken: currentIdToken || currentUser.idToken || "",
          lineUserId: currentUser.lineUserId || "",
          quoteNo: quoteNo,
          reason: reason || "cancel from LIFF"
        });
    
        if (!res || res.ok === false) {
          throw new Error((res && (res.error || res.message)) || "ยกเลิกไม่สำเร็จ");
        }
    
        closeQuoteCancelModal_();
    
        showToast("ยกเลิกใบเสนอราคาแล้วครับ", "success", 1800);
    
        appState.quote.initialized = false;
        await quoteReload_();
    
      } catch (err) {
        console.error("[quotePerformCancel_]", err);
        showToast(err.message || "ยกเลิกไม่สำเร็จ", "error", 2800);
    
      } finally {
        if (confirmBtn) {
          confirmBtn.disabled = false;
          confirmBtn.textContent = "ยืนยันยกเลิก";
        }
    
        if (originalBtn) {
          originalBtn.disabled = false;
          originalBtn.textContent = oldText || "ยกเลิก";
        }
      }
    }
    
    function bindQuoteEvents_() {
      const st = appState.quote;
      const search = $("quoteSearch");
    
      if (search) {
        search.value = st.keyword || "";
    
        search.addEventListener("input", function() {
          st.keyword = String(this.value || "");
          quoteRenderAll_();
        });
      }
    }

    function handleBrandLogoError_(img) {
      if (!img) return;
    
      img.style.display = "none";
    
      const fallback = document.getElementById("brandLogoFallback");
      if (fallback) {
        fallback.style.display = "inline-flex";
      }
    }
  </script>
</body>
</html>
