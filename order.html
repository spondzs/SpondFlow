<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>SpondFlow - Order Form</title>

  <style>
    :root {
      --blue: #5c74f2;
      --blue2: #7b8eff;
      --blue3: #91a2ff;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #172033;
      --muted: #6b7280;
      --line: #e5e7eb;
      --soft: #f8fafc;
      --danger: #dc2626;
      --ok: #16a34a;
      --dark: #111827;
      --shadow: 0 10px 24px rgba(31, 41, 55, 0.08);
      --shadow-strong: 0 18px 42px rgba(31, 41, 55, 0.18);
    }
  
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
  
    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.45;
    }
  
    body {
      padding-bottom: calc(20px + env(safe-area-inset-bottom));
    }
  
    button,
    input {
      font: inherit;
    }
  
    button {
      cursor: pointer;
    }
  
    .app {
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
      min-height: 100vh;
    }
  
    /* =========================
     * APP BAR ใหม่
     * ========================= */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      overflow: hidden;
      padding: calc(12px + env(safe-area-inset-top)) 16px 14px;
      background:
        radial-gradient(circle at 88% 18%, rgba(255,255,255,0.34), transparent 28%),
        linear-gradient(135deg, #526cf0 0%, #6f83ff 54%, #8fa0ff 100%);
      color: #ffffff;
      box-shadow: 0 8px 22px rgba(92, 116, 242, 0.24);
    }
  
    .topbar::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.10), transparent 42%),
        radial-gradient(circle at 16% 40%, rgba(255,255,255,0.18), transparent 24%);
      pointer-events: none;
    }
  
    .topbar-inner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }
  
    .back-btn {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.18);
      color: #ffffff;
      font-size: 26px;
      font-weight: 900;
      line-height: 1;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25);
    }
  
    .title-wrap {
      flex: 1;
      min-width: 0;
    }
  
    .title {
      font-size: 22px;
      font-weight: 950;
      line-height: 1.18;
      letter-spacing: -0.2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  
    .subtitle {
      display: none !important;
    }
  
    .mascot {
      width: 50px;
      height: 50px;
      border-radius: 18px;
      padding: 3px;
      background: linear-gradient(160deg, rgba(255,255,255,0.98), rgba(255,255,255,0.58));
      object-fit: cover;
      box-shadow:
        0 8px 18px rgba(31, 41, 55, 0.16),
        inset 0 1px 0 rgba(255,255,255,0.8);
      animation: mascotFadeFloat 2.4s ease-in-out infinite;
    }
  
    @keyframes mascotFadeFloat {
      0%, 100% {
        transform: translateY(0);
        opacity: 0.96;
      }
      50% {
        transform: translateY(-3px);
        opacity: 1;
      }
    }
  
    .content {
      padding: 14px;
    }
  
    .card {
      margin-bottom: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: var(--card);
      box-shadow: var(--shadow);
    }
  
    .card-title {
      margin-bottom: 12px;
      font-size: 19px;
      font-weight: 950;
      color: #24304f;
      letter-spacing: -0.15px;
    }
  
    /* ตัดคำอธิบายเทา ๆ ออก */
    .card-sub {
      display: none !important;
    }
  
    .search-wrap {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }
  
    .search-icon {
      color: #8b95a7;
      font-size: 18px;
      font-weight: 900;
    }
  
    .search-input {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font-size: 16px;
      font-weight: 650;
    }
  
    .search-input::placeholder {
      color: #a0a7b4;
      font-weight: 600;
    }
  
    .clear-btn {
      width: 32px;
      height: 32px;
      border: 0;
      border-radius: 999px;
      background: #f1f5f9;
      color: #64748b;
      font-size: 22px;
      line-height: 1;
    }
  
    .customer-picker {
      position: relative;
    }
  
    .dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      z-index: 30;
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #ffffff;
      box-shadow: var(--shadow-strong);
    }
  
    .customer-option {
      padding: 13px 14px;
      border-bottom: 1px solid #eef2f7;
    }
  
    .customer-option:last-child {
      border-bottom: 0;
    }
  
    .customer-option:active {
      background: #f8fbff;
    }
  
    .customer-name {
      font-size: 15px;
      font-weight: 950;
      color: #1f2937;
    }
  
    .customer-meta {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }
  
    .selected-customer {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: #f8fbff;
      border: 1px solid #dbeafe;
      color: #334155;
      font-size: 14px;
    }
  
    .selected-customer b {
      color: #1e3a8a;
    }
  
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 12px;
    }
  
    .product-card {
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      background: linear-gradient(180deg, #ffffff, #fbfcff);
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
  
    .product-card:active {
      transform: scale(0.992);
    }
  
    .product-card.selected {
      border-color: #c7d2fe;
      background: linear-gradient(180deg, #ffffff, #f7f9ff);
      box-shadow: 0 8px 18px rgba(92, 116, 242, 0.08);
    }
  
    .product-head {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }
  
    .product-main {
      flex: 1;
      min-width: 0;
    }
  
    .product-name {
      font-size: 16px;
      font-weight: 950;
      color: #111827;
      line-height: 1.35;
      word-break: break-word;
    }
  
    .product-meta {
      display: none !important;
    }
  
    .product-price {
      white-space: nowrap;
      font-size: 14px;
      font-weight: 950;
      color: #315bc8;
    }
  
    .product-foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
    }
  
    .stock-meta {
      flex: 1;
      font-size: 13px;
      color: #64748b;
      line-height: 1.45;
    }
  
    .stock-meta b {
      color: #111827;
    }
  
    .qty-stepper {
      display: grid;
      grid-template-columns: 42px 48px 42px;
      height: 42px;
      overflow: hidden;
      border: 1px solid #d8e0f2;
      border-radius: 999px;
      background: #f8fbff;
      flex: 0 0 auto;
    }
  
    .qty-btn {
      border: 0;
      background: transparent;
      color: var(--blue);
      font-size: 24px;
      font-weight: 950;
      line-height: 42px;
      padding: 0;
    }
  
    .qty-btn:disabled {
      opacity: 0.28;
    }
  
    .qty-num {
      display: block;
      height: 42px;
      line-height: 42px;
      text-align: center;
      font-size: 18px;
      font-weight: 950;
      color: #315bc8;
    }
  
    .empty {
      padding: 22px 14px;
      border: 1px dashed #d5dcea;
      border-radius: 18px;
      background: #fbfcff;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }
  
    /* =========================
     * REVIEW เหลือสั้น ๆ
     * ========================= */
    .review-box {
      padding: 14px;
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      background: #fbfcff;
    }
  
    .review-section + .review-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #dbe3f0;
    }
  
    .review-label {
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 900;
      color: #64748b;
    }
  
    .review-main {
      font-size: 16px;
      font-weight: 950;
      color: #1f2937;
      word-break: break-word;
    }
  
    .review-sub {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      white-space: pre-wrap;
    }
  
    .review-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px dashed #e2e8f0;
    }
  
    .review-item:last-child {
      border-bottom: 0;
    }
  
    .review-item-name {
      flex: 1;
      min-width: 0;
      font-size: 14px;
      color: #24304f;
      line-height: 1.35;
      word-break: break-word;
    }
  
    .review-item-right {
      white-space: nowrap;
      text-align: right;
      font-size: 14px;
      font-weight: 950;
      color: #111827;
    }
  
    /* ไม่โชว์กล่องดำบนหน้าแล้ว ให้ไปโชว์ใน popup */
    .command-preview {
      display: none !important;
    }
  
    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }
  
    .btn {
      min-height: 54px;
      border: 0;
      border-radius: 18px;
      font-weight: 950;
      font-size: 16px;
    }
  
    .btn.secondary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(92, 116, 242, 0.18);
    }
  
    .btn.primary {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(92, 116, 242, 0.18);
    }
  
    .btn:disabled {
      opacity: 0.48;
      cursor: default;
    }
  
    #sendBtn {
      display: none !important;
    }
  
    /* =========================
     * POPUP ตรวจสอบรายการ
     * ========================= */
    .review-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 99998;
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      background: rgba(15, 23, 42, 0.48);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
  
    .review-modal-backdrop.show {
      display: flex;
    }
  
    .review-modal {
      width: min(520px, 100%);
      max-height: calc(100vh - 54px);
      overflow-y: auto;
      border-radius: 28px;
      background: #ffffff;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.28);
      animation: modalUp 0.18s ease-out;
    }
  
    @keyframes modalUp {
      from {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  
    .modal-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 16px 10px;
    }
  
    .modal-icon {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, #eef3ff, #e5ebff);
      font-size: 22px;
    }
  
    .modal-title-wrap {
      flex: 1;
      min-width: 0;
    }
  
    .modal-title {
      font-size: 19px;
      font-weight: 950;
      color: #172033;
      line-height: 1.2;
    }
  
    .modal-sub {
      margin-top: 3px;
      font-size: 13px;
      color: #64748b;
    }
  
    .modal-close {
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: #f1f5f9;
      color: #475569;
      font-size: 24px;
      line-height: 1;
    }
  
    .modal-command {
      margin: 6px 16px 0;
      padding: 16px;
      border-radius: 20px;
      background:
        radial-gradient(circle at 92% 0%, rgba(92,116,242,0.24), transparent 30%),
        #101827;
      color: #e5e7eb;
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }
  
    .modal-summary {
      display: flex;
      gap: 10px;
      margin: 12px 16px 0;
    }
  
    .modal-summary-card {
      flex: 1;
      padding: 12px;
      border-radius: 18px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
    }
  
    .modal-summary-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 800;
    }
  
    .modal-summary-value {
      margin-top: 3px;
      font-size: 17px;
      color: #172033;
      font-weight: 950;
    }
  
    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1.45fr;
      gap: 10px;
      padding: 16px;
    }
  
    .modal-btn {
      min-height: 52px;
      border: 0;
      border-radius: 18px;
      font-weight: 950;
      font-size: 15px;
    }
  
    .modal-btn.copy {
      background: #eef2f7;
      color: #334155;
    }
  
    .modal-btn.send {
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: #ffffff;
      box-shadow: 0 10px 20px rgba(92, 116, 242, 0.18);
    }
  
    /* =========================
     * LOADING / TOAST
     * ========================= */
    .loading {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f6fb;
      transition: opacity 0.25s ease, visibility 0.25s ease;
    }
  
    .loading.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  
    .loading-card {
      width: min(320px, calc(100vw - 40px));
      text-align: center;
      padding: 24px;
    }
  
    .loading-card img {
      width: 108px;
      height: 108px;
      object-fit: contain;
      animation: floatCaffe 1.6s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(92, 116, 242, 0.16));
    }
  
    .loading-title {
      margin-top: 12px;
      font-size: 24px;
      font-weight: 950;
      color: var(--blue);
    }
  
    .loading-text {
      min-height: 22px;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }
  
    .loading-bar {
      height: 10px;
      margin-top: 18px;
      border-radius: 999px;
      overflow: hidden;
      background: #dfe7f5;
    }
  
    .loading-fill {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--blue2));
      transition: width 0.2s ease;
    }
  
    .loading-percent {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 950;
      color: #64748b;
    }
  
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(20px + env(safe-area-inset-bottom));
      z-index: 999999;
      max-width: calc(100vw - 32px);
      min-width: 190px;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(17, 24, 39, 0.94);
      color: #ffffff;
      text-align: center;
      font-size: 14px;
      font-weight: 850;
      opacity: 0;
      transform: translateX(-50%) translateY(16px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }
  
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  
    .toast.success {
      background: rgba(22, 163, 74, 0.96);
    }
  
    .toast.warn {
      background: rgba(180, 83, 9, 0.96);
    }
  
    .toast.error {
      background: rgba(220, 38, 38, 0.96);
    }
  
    @keyframes floatCaffe {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
  
    @media (max-width: 420px) {
      .content {
        padding: 12px;
      }
  
      .card {
        padding: 14px;
        border-radius: 20px;
      }
  
      .product-foot {
        align-items: center;
      }
  
      .modal-actions {
        grid-template-columns: 1fr;
      }
  
      .review-modal-backdrop {
        padding: 10px;
      }
  
      .review-modal {
        border-radius: 24px;
      }
    }
  </style>

  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <div id="loading" class="loading">
    <div class="loading-card">
      <img id="loadingMascot" src="./Caffe.PNG" alt="NongCaffe">
      <div class="loading-title">น้องกาแฟ ☕️</div>
      <div id="loadingText" class="loading-text">กำลังเตรียมข้อมูลให้ครับ...</div>
      <div class="loading-bar">
        <div id="loadingFill" class="loading-fill"></div>
      </div>
      <div id="loadingPercent" class="loading-percent">0%</div>
    </div>
  </div>

  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <button id="backBtn" class="back-btn" type="button">‹</button>
        <div class="title-wrap">
          <div class="title">สร้างรายการ #สั่งของ</div>
          <div class="subtitle">เลือกลูกค้า เลือกสินค้า แล้วส่งเข้ากลุ่มได้เลย</div>
        </div>
        <img id="topMascot" class="mascot" src="./Caffe.PNG" alt="NongCaffe">
      </div>
    </header>

    <main class="content">
      <section class="card">
        <div class="card-title">เลือกลูกค้า</div>
        <div class="card-sub">ค้นหาด้วยชื่อร้าน รหัสลูกค้า หรือเบอร์โทร</div>

        <div class="customer-picker">
          <div class="search-wrap">
            <div class="search-icon">⌕</div>
            <input id="customerSearch" class="search-input" placeholder="ค้นหาลูกค้า" autocomplete="off">
            <button id="clearCustomerBtn" class="clear-btn" type="button" style="display:none;">×</button>
          </div>
          <div id="customerDropdown" class="dropdown" style="display:none;"></div>
        </div>

        <div id="selectedCustomerBox" class="selected-customer" style="display:none;"></div>
      </section>      

      <section class="card">
        <div class="card-title">ค้นหาสินค้า</div>
        <div class="card-sub">กด + / - ที่การ์ดสินค้าได้เลย ไม่ต้องเปิดหลายหน้า</div>

        <div class="search-wrap">
          <div class="search-icon">⌕</div>
          <input id="catalogSearch" class="search-input" placeholder="ค้นหารุ่น เช่น Y31d, V70, X300">
        </div>

        <div id="catalogList" class="list"></div>
      </section>

      <section class="card">
        <div class="card-title">ตรวจสอบรายการ</div>

        <div id="reviewBox" class="review-box"></div>

        <div id="commandPreview" class="command-preview" style="display:none;"></div>

        <div class="actions">
          <button id="copyBtn" class="btn secondary" type="button">คัดลอก</button>
          <button id="sendBtn" class="btn primary" type="button">ส่งรายการ #สั่งของ เข้ากลุ่ม</button>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
      /************************************************************
       * CONFIG
       ************************************************************/
      var API_BASE = 'https://script.google.com/macros/s/AKfycbw4jAzjWors_9dwQx1bI2RpVzm56icKOcTDYutQZIindgZb3f67MqoduccqgFnM6TzgaA/exec';
      var LIFF_ID = '2009366271-alnowbyZ';
      var MASCOT_URL = './Caffe.PNG';
    
      var ACTIONS = {
        init: 'liff_order_form_init',
        customers: 'liff_order_search_customers',
        catalog: 'liff_order_search_stock'
      };
    
      /************************************************************
       * STATE
       ************************************************************/
      var LIFF_READY = false;
      var TOAST_TIMER = null;
      var CUSTOMER_TIMER = null;
      var CATALOG_TIMER = null;
    
      var state = {
        auth: {
          lineUserId: '',
          displayName: '',
          isInClient: false,
          role: '',
          scopes: []
        },
        customer: {
          keyword: '',
          selected: null,
          options: [],
          dropdownOpen: false,
          loading: false
        },
        catalog: {
          keyword: '',
          items: [],
          loading: false
        },
        order: {
          warehouseKey: 'RemainQuota',
          cart: {}
        }
      };
    
      /************************************************************
       * BASIC HELPERS
       ************************************************************/
      function $(id) {
        return document.getElementById(id);
      }
    
      function escapeHtml(str) {
        return String(str == null ? '' : str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }
    
      function fmt(n) {
        try {
          return Number(n || 0).toLocaleString('th-TH', {
            maximumFractionDigits: 2
          });
        } catch (e) {
          return String(n || 0);
        }
      }
    
      function showToast(message, type, ms) {
        var el = $('toast');
        if (!el) return;
    
        el.textContent = String(message || '');
        el.className = 'toast show';
        if (type) el.classList.add(type);
    
        clearTimeout(TOAST_TIMER);
        TOAST_TIMER = setTimeout(function() {
          el.className = 'toast';
        }, ms || 1600);
      }
    
      function setLoading(percent, text) {
        var p = Math.max(0, Math.min(100, Number(percent || 0)));
        var fill = $('loadingFill');
        var label = $('loadingPercent');
        var txt = $('loadingText');
    
        if (fill) fill.style.width = p + '%';
        if (label) label.textContent = p + '%';
        if (txt && text) txt.textContent = text;
      }
    
      function hideLoading() {
        var el = $('loading');
        if (el) el.classList.add('hide');
      }
    
      function debounce(fn, delay, bucketName) {
        clearTimeout(bucketName === 'customer' ? CUSTOMER_TIMER : CATALOG_TIMER);
    
        var timer = setTimeout(fn, delay || 260);
    
        if (bucketName === 'customer') CUSTOMER_TIMER = timer;
        else CATALOG_TIMER = timer;
      }
    
      function polishStaticText() {
        var title = document.querySelector('.title');
        var customerInput = $('customerSearch');
        var catalogInput = $('catalogSearch');
        var copyBtn = $('copyBtn');
    
        if (title) title.textContent = 'สร้างฟอร์ม #สั่งของ';
        if (customerInput) customerInput.placeholder = 'ค้นหาลูกค้า';
        if (catalogInput) catalogInput.placeholder = 'ค้นหารุ่น';
        if (copyBtn) copyBtn.textContent = 'ตรวจสอบรายการ';
      }
    
      function applyMascot() {
        var loadingMascot = $('loadingMascot');
        var topMascot = $('topMascot');
    
        [loadingMascot, topMascot].forEach(function(img) {
          if (!img) return;
          img.src = MASCOT_URL;
          img.onerror = function() {
            this.onerror = null;
            this.src = './Caffe.png';
          };
        });
      }
    
      /************************************************************
       * JSONP API
       ************************************************************/
      function loadJsonp(action, params) {
        params = params || {};
    
        return new Promise(function(resolve, reject) {
          var cbName = '__ncf_cb_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
          var script = document.createElement('script');
          var qs = 'action=' + encodeURIComponent(action) + '&callback=' + encodeURIComponent(cbName);
    
          Object.keys(params).forEach(function(key) {
            var value = params[key];
            if (value == null) value = '';
            qs += '&' + encodeURIComponent(key) + '=' + encodeURIComponent(String(value));
          });
    
          var done = false;
    
          function cleanup() {
            try { delete window[cbName]; } catch (e) { window[cbName] = undefined; }
            if (script.parentNode) script.parentNode.removeChild(script);
          }
    
          window[cbName] = function(data) {
            if (done) return;
            done = true;
            cleanup();
            resolve(data);
          };
    
          script.onerror = function() {
            if (done) return;
            done = true;
            cleanup();
            reject(new Error('โหลดข้อมูลไม่สำเร็จ: ' + action));
          };
    
          script.src = API_BASE + '?' + qs;
          document.body.appendChild(script);
    
          setTimeout(function() {
            if (done) return;
            done = true;
            cleanup();
            reject(new Error('เชื่อมต่อช้าเกินไป: ' + action));
          }, 15000);
        });
      }
    
      function unwrapList(data, keys) {
        if (Array.isArray(data)) return data;
        if (!data) return [];
    
        for (var i = 0; i < keys.length; i++) {
          var k = keys[i];
          if (Array.isArray(data[k])) return data[k];
        }
    
        if (data.ok === true) {
          if (Array.isArray(data.items)) return data.items;
          if (Array.isArray(data.data)) return data.data;
        }
    
        return [];
      }
    
      /************************************************************
       * LIFF
       ************************************************************/
      async function ensureLiffReady() {
        if (LIFF_READY) return true;
    
        setLoading(15, 'กำลังเชื่อมต่อ LINE...');
    
        if (!window.liff) {
          throw new Error('ไม่พบ LIFF SDK');
        }
    
        await liff.init({
          liffId: LIFF_ID,
          withLoginOnExternalBrowser: true
        });
    
        state.auth.isInClient = !!liff.isInClient();
    
        if (!liff.isLoggedIn()) {
          liff.login();
          return false;
        }
    
        setLoading(35, 'กำลังโหลดโปรไฟล์ LINE...');
    
        var profile = await liff.getProfile();
    
        state.auth.lineUserId = String((profile && profile.userId) || '');
        state.auth.displayName = String((profile && profile.displayName) || '');
    
        LIFF_READY = true;
        return true;
      }
    
      /************************************************************
       * DATA LOADERS
       ************************************************************/
      async function loadInit() {
        try {
          var data = await loadJsonp(ACTIONS.init, {
            lineUserId: state.auth.lineUserId || '',
            brand: 'all',
            warehouseKey: state.order.warehouseKey || 'RemainQuota'
          });
    
          if (data && data.ok === false) {
            throw new Error(data.error || 'โหลดข้อมูลเริ่มต้นไม่สำเร็จ');
          }
    
          if (data && data.employee) {
            state.auth.role = data.employee.role || '';
          }
    
          if (data && Array.isArray(data.stockItems)) {
            state.catalog.items = data.stockItems
              .map(normalizeProduct)
              .filter(function(x) {
                return !!(x && x.modelBase);
              });
          }
    
          return data || {};
        } catch (e) {
          console.warn(e);
          return {};
        }
      }
    
      async function loadCustomers(keyword) {
        state.customer.loading = true;
        state.customer.keyword = String(keyword || '');
    
        try {
          var data = await loadJsonp(ACTIONS.customers, {
            lineUserId: state.auth.lineUserId || '',
            keyword: state.customer.keyword,
            limit: 80
          });
    
          if (data && data.ok === false) {
            throw new Error(data.error || 'โหลดลูกค้าไม่สำเร็จ');
          }
    
          var list = unwrapList(data, ['customers', 'items', 'data', 'results']);
    
          state.customer.options = list.map(function(x) {
            return {
              customerNo: String(x.customerNo || x.CustomerNo || x.no || x.code || '').trim(),
              name: String(x.name || x.customerName || x.CustomerName || x.shopName || x.label || '').trim(),
              phone: String(x.phone || x.tel || x.mobile || '').trim(),
              address: String(x.address || x.Address || '').trim()
            };
          }).filter(function(x) {
            return x.customerNo || x.name;
          });
    
          renderCustomerDropdown();
    
        } catch (e) {
          console.error(e);
          showToast(e.message || 'โหลดลูกค้าไม่สำเร็จ', 'error', 2200);
        } finally {
          state.customer.loading = false;
        }
      }
    
      async function loadCatalog(keyword) {
        state.catalog.loading = true;
        state.catalog.keyword = String(keyword || '');
    
        renderCatalog();
    
        try {
          var data = await loadJsonp(ACTIONS.catalog, {
            lineUserId: state.auth.lineUserId || '',
            keyword: state.catalog.keyword,
            warehouseKey: state.order.warehouseKey || 'RemainQuota',
            brand: 'all',
            limit: 120
          });
    
          if (data && data.ok === false) {
            throw new Error(data.error || 'โหลดสินค้าไม่สำเร็จ');
          }
    
          var list = unwrapList(data, ['stockItems', 'catalog', 'items', 'products', 'data', 'results']);
    
          state.catalog.items = list
            .map(normalizeProduct)
            .filter(function(x) {
              return !!(x && x.modelBase);
            });
    
          renderCatalog();
    
        } catch (e) {
          console.error(e);
          showToast(e.message || 'โหลดสินค้าไม่สำเร็จ', 'error', 2400);
          state.catalog.items = [];
          renderCatalog();
        } finally {
          state.catalog.loading = false;
        }
      }
    
      function normalizeProduct(x) {
        x = x || {};
    
        var quota = x.quota || x.stock || {};
        var priceModes = x.priceModes || x.prices || {};
    
        var modelBase = String(x.modelBase || x.ModelBase || x.model || '').trim();
        var series = String(x.series || x.Series || '').trim();
        var displayName = String(x.displayName || x.name || modelBase).trim();
     
        var orderLine = String(
          x.orderLine ||
          x.OrderLine ||
          x.orderLineTemplate ||
          x.commandLine ||
          ''
        ).trim();
    
        var remainQuota = Number(
          x.remainQuota ||
          x.available ||
          x.qtyAvailable ||
          quota.RemainQuota ||
          x.RemainQuota ||
          0
        );
    
        return {
          modelBase: modelBase,
          displayName: displayName || modelBase,
          orderLine: normalizeOrderLineBase(orderLine || buildOrderLineFromModelBase(modelBase)),
          series: series,
          color: String(x.color || x.ColorName || x.colorName || x.ColorTH || '').trim(),
          price: Number(x.price || x.priceWholesale || x.PriceWholesale || priceModes.wholesale || 0),
          quota: {
            RemainQuota: remainQuota,
            RemainQuota2: Number(quota.RemainQuota2 || x.RemainQuota2 || 0),
            RemainQuota3: Number(quota.RemainQuota3 || x.RemainQuota3 || 0)
          }
        };
      }
    
      function normalizeOrderLineBase(line) {
        return String(line || '')
          .replace(/\s+x\s*$/i, '')
          .replace(/\s+x\s*\d+\s*$/i, '')
          .replace(/\s+/g, ' ')
          .trim();
      }
    
      function buildOrderLineFromModelBase(modelBase) {
        var s = String(modelBase || '').trim();
    
        s = s
          .replace(/^vivo\s*[-–]\s*/i, '')
          .replace(/^iqoo\s*[-–]\s*/i, 'iQOO ')
          .replace(/\(\s*(\d+)\s*[+\/]\s*(\d+)\s*GB\s*\)/ig, '$1+$2')
          .replace(/\(\s*(\d+)\s*[+\/]\s*(\d+)\s*\)/ig, '$1+$2')
          .replace(/\(\s*demo\s*\)/ig, '')
          .replace(/\bdemo\b/ig, '')
          .replace(/\s+/g, ' ')
          .trim();
    
        return s;
      }
    
      /************************************************************
       * CART
       ************************************************************/
      function cartItems() {
        return Object.keys(state.order.cart).map(function(k) {
          return state.order.cart[k];
        });
      }
    
      function availableQty(product) {
        var q = product && product.quota ? product.quota : {};
        return Number(q[state.order.warehouseKey] || 0);
      }
    
      function getCartQty(modelBase) {
        var it = state.order.cart[String(modelBase || '')];
        return it ? Number(it.qty || 0) : 0;
      }
    
      function setCartQty(product, qty) {
        if (!product || !product.modelBase) return;
    
        var modelBase = String(product.modelBase || '');
        var nextQty = Math.max(0, Number(qty || 0));
        var maxQty = availableQty(product);
    
        if (maxQty <= 0 && nextQty > 0) {
          showToast('รุ่นนี้ไม่มีโควต้าพร้อมขาย', 'warn', 1800);
          return;
        }
    
        if (maxQty > 0 && nextQty > maxQty) {
          nextQty = maxQty;
          showToast('ปรับเป็นจำนวนสูงสุดที่มีแล้ว', 'warn', 1500);
        }
    
        if (nextQty <= 0) {
          delete state.order.cart[modelBase];
        } else {
          state.order.cart[modelBase] = {
            modelBase: product.modelBase,
            displayName: product.displayName || product.modelBase,
            orderLine: normalizeOrderLineBase(product.orderLine || product.modelBase),
            qty: nextQty,
            price: Number(product.price || 0),
            warehouseKey: state.order.warehouseKey
          };
        }
    
        renderAll();
      }
    
      function totalQty() {
        return cartItems().reduce(function(sum, x) {
          return sum + Number(x.qty || 0);
        }, 0);
      }
    
      /************************************************************
       * BUILD #สั่งของ TEXT
       ************************************************************/
      function customerLabel() {
        var c = state.customer.selected || {};
        return String(c.name || c.customerNo || '').trim();
      }
    
      function canBuildOrder() {
        return !!(customerLabel() && cartItems().length);
      }
    
      function buildOrderText() {
        var name = customerLabel();
        var items = cartItems();
    
        var lines = [];
    
        lines.push('#สั่งของ ' + name);
        lines.push('');
    
        items.forEach(function(it) {
          var baseLine = normalizeOrderLineBase(it.orderLine || it.modelBase || '');
          lines.push(baseLine + ' x' + Number(it.qty || 0));
        });
    
        return lines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
      }
    
      /************************************************************
       * RENDER
       ************************************************************/
      function renderAll() {
        renderSelectedCustomer();
        renderCatalog();
        renderReview();
        renderButtons();
      }
    
      function renderSelectedCustomer() {
        var box = $('selectedCustomerBox');
        var input = $('customerSearch');
        var clearBtn = $('clearCustomerBtn');
        var c = state.customer.selected;
    
        if (clearBtn && input) {
          clearBtn.style.display = String(input.value || '').trim() ? '' : 'none';
        }
    
        if (!box) return;
    
        if (!c) {
          box.style.display = 'none';
          box.innerHTML = '';
          return;
        }
    
        box.style.display = '';
        box.innerHTML =
          '<b>' + escapeHtml(c.name || '-') + '</b><br>' +
          'รหัสลูกค้า: ' + escapeHtml(c.customerNo || '-') +
          (c.phone ? ' | โทร: ' + escapeHtml(c.phone) : '');
      }
    
      function renderCustomerDropdown() {
        var box = $('customerDropdown');
        if (!box) return;
    
        var keyword = String(state.customer.keyword || '').trim();
        var options = state.customer.options || [];
    
        if (!state.customer.dropdownOpen || !keyword) {
          box.style.display = 'none';
          box.innerHTML = '';
          return;
        }
    
        box.style.display = '';
    
        if (state.customer.loading) {
          box.innerHTML = '<div class="customer-option"><div class="customer-meta">กำลังค้นหา...</div></div>';
          return;
        }
    
        if (!options.length) {
          box.innerHTML = '<div class="customer-option"><div class="customer-meta">ไม่พบลูกค้าที่ค้นหา</div></div>';
          return;
        }
    
        var html = '';
    
        options.forEach(function(c, idx) {
          html +=
            '<div class="customer-option" data-idx="' + idx + '">' +
              '<div class="customer-name">' + escapeHtml(c.name || '-') + '</div>' +
              '<div class="customer-meta">' +
                'รหัสลูกค้า: ' + escapeHtml(c.customerNo || '-') +
                (c.phone ? ' | โทร: ' + escapeHtml(c.phone) : '') +
              '</div>' +
            '</div>';
        });
    
        box.innerHTML = html;
    
        Array.prototype.forEach.call(box.querySelectorAll('.customer-option'), function(el) {
          el.addEventListener('click', function() {
            var idx = Number(this.getAttribute('data-idx'));
            var c = state.customer.options[idx];
            if (!c) return;
    
            state.customer.selected = c;
            state.customer.keyword = c.name || '';
    
            var input = $('customerSearch');
            if (input) input.value = c.name || '';
    
            state.customer.dropdownOpen = false;
    
            renderAll();
            renderCustomerDropdown();
            showToast('เลือกลูกค้าแล้ว', 'success', 1000);
          });
        });
      }
    
      function renderCatalog() {
        var box = $('catalogList');
        if (!box) return;
    
        if (state.catalog.loading) {
          box.innerHTML = '<div class="empty">กำลังโหลดสินค้า...</div>';
          return;
        }
    
        var items = state.catalog.items || [];
    
        if (!items.length) {
          box.innerHTML = '<div class="empty">ค้นหารุ่นสินค้าเพื่อเริ่มเลือกของได้เลยครับ</div>';
          return;
        }
    
        var html = '';
    
        items.forEach(function(p, idx) {
          var q = getCartQty(p.modelBase);
          var available = availableQty(p);
          var selected = q > 0 ? ' selected' : '';
          var minusDisabled = q <= 0 ? ' disabled' : '';
          var plusDisabled = available <= 0 || q >= available ? ' disabled' : '';
    
          html +=
            '<div class="product-card' + selected + '" data-idx="' + idx + '">' +
              '<div class="product-head">' +
                '<div class="product-main">' +
                  '<div class="product-name">' + escapeHtml(p.displayName || p.modelBase || '-') + '</div>' +
                '</div>' +
                '<div class="product-price">' + (p.price ? fmt(p.price) + ' ฿' : '') + '</div>' +
              '</div>' +
    
              '<div class="product-foot">' +
                '<div class="stock-meta">' +
                  'พร้อมขาย: <b>' + fmt(available) + '</b>' +
                '</div>' +
    
                '<div class="qty-stepper">' +
                  '<button class="qty-btn minus-btn" type="button"' + minusDisabled + '>−</button>' +
                  '<span class="qty-num">' + fmt(q) + '</span>' +
                  '<button class="qty-btn plus-btn" type="button"' + plusDisabled + '>+</button>' +
                '</div>' +
              '</div>' +
            '</div>';
        });
    
        box.innerHTML = html;
    
        Array.prototype.forEach.call(box.querySelectorAll('.product-card'), function(el) {
          var idx = Number(el.getAttribute('data-idx'));
          var product = state.catalog.items[idx];
          if (!product) return;
    
          var minus = el.querySelector('.minus-btn');
          var plus = el.querySelector('.plus-btn');
    
          if (minus) {
            minus.addEventListener('click', function() {
              setCartQty(product, getCartQty(product.modelBase) - 1);
            });
          }
    
          if (plus) {
            plus.addEventListener('click', function() {
              setCartQty(product, getCartQty(product.modelBase) + 1);
            });
          }
        });
      }
    
      function renderReview() {
        var box = $('reviewBox');
        var preview = $('commandPreview');
        if (!box) return;
    
        var c = state.customer.selected;
        var items = cartItems();
    
        var customerHtml = c
          ? '<div class="review-main">' + escapeHtml(c.name || '-') + '</div>' +
            '<div class="review-sub">รหัสลูกค้า: ' + escapeHtml(c.customerNo || '-') + '</div>'
          : '<div class="review-sub">ยังไม่ได้เลือกลูกค้า</div>';
    
        var itemHtml = '';
    
        if (!items.length) {
          itemHtml = '<div class="review-sub">ยังไม่มีรายการสินค้า</div>';
        } else {
          items.slice(0, 4).forEach(function(it) {
            itemHtml +=
              '<div class="review-item">' +
                '<div class="review-item-name">' + escapeHtml(it.orderLine || it.modelBase || '-') + '</div>' +
                '<div class="review-item-right">x' + fmt(it.qty || 0) + '</div>' +
              '</div>';
          });
    
          if (items.length > 4) {
            itemHtml += '<div class="review-sub">และอีก ' + fmt(items.length - 4) + ' รายการ</div>';
          }
        }
    
        box.innerHTML =
          '<div class="review-section">' +
            '<div class="review-label">ลูกค้า</div>' +
            customerHtml +
          '</div>' +
    
          '<div class="review-section">' +
            '<div class="review-label">รายการที่เลือก</div>' +
            itemHtml +
          '</div>' +
    
          '<div class="review-section">' +
            '<div class="review-label">รวม</div>' +
            '<div class="review-main">' + fmt(totalQty()) + ' เครื่อง</div>' +
          '</div>';
    
        if (preview) {
          preview.style.display = 'none';
          preview.textContent = canBuildOrder() ? buildOrderText() : '';
        }
      }
    
      function renderButtons() {
        var ok = canBuildOrder();
        var copyBtn = $('copyBtn');
        var sendBtn = $('sendBtn');
    
        if (copyBtn) {
          copyBtn.disabled = !ok;
          copyBtn.textContent = 'ตรวจสอบรายการ';
        }
    
        if (sendBtn) {
          sendBtn.disabled = !ok;
          sendBtn.style.display = 'none';
        }
      }
    
      /************************************************************
       * REVIEW MODAL
       ************************************************************/
      function ensureReviewModal() {
        if ($('reviewModalBackdrop')) return;
    
        var wrap = document.createElement('div');
        wrap.id = 'reviewModalBackdrop';
        wrap.className = 'review-modal-backdrop';
    
        wrap.innerHTML =
          '<div class="review-modal">' +
            '<div class="modal-head">' +
              '<div class="modal-icon">📋</div>' +
              '<div class="modal-title-wrap">' +
                '<div class="modal-title">ตรวจสอบก่อนส่ง</div>' +
                '<div class="modal-sub">ข้อความที่จะส่งเข้ากลุ่ม</div>' +
              '</div>' +
              '<button id="modalCloseBtn" class="modal-close" type="button">×</button>' +
            '</div>' +
    
            '<div id="modalCommandText" class="modal-command"></div>' +
    
            '<div class="modal-summary">' +
              '<div class="modal-summary-card">' +
                '<div class="modal-summary-label">ลูกค้า</div>' +
                '<div id="modalCustomerName" class="modal-summary-value">-</div>' +
              '</div>' +
              '<div class="modal-summary-card">' +
                '<div class="modal-summary-label">รวม</div>' +
                '<div id="modalTotalQty" class="modal-summary-value">0 เครื่อง</div>' +
              '</div>' +
            '</div>' +
    
            '<div class="modal-actions">' +
              '<button id="modalCopyBtn" class="modal-btn copy" type="button">คัดลอก</button>' +
              '<button id="modalSendBtn" class="modal-btn send" type="button">ส่งเข้ากลุ่ม</button>' +
            '</div>' +
          '</div>';
    
        document.body.appendChild(wrap);
    
        $('modalCloseBtn').addEventListener('click', closeReviewModal);
        $('modalCopyBtn').addEventListener('click', copyOrderText);
        $('modalSendBtn').addEventListener('click', sendOrderToChat);
    
        wrap.addEventListener('click', function(e) {
          if (e.target === wrap) closeReviewModal();
        });
      }
    
      function openReviewModal() {
        if (!canBuildOrder()) {
          showToast('เลือกลูกค้าและสินค้าให้ครบก่อนครับ', 'warn', 1600);
          return;
        }
    
        ensureReviewModal();
    
        $('modalCommandText').textContent = buildOrderText();
        $('modalCustomerName').textContent = customerLabel() || '-';
        $('modalTotalQty').textContent = fmt(totalQty()) + ' เครื่อง';
    
        $('reviewModalBackdrop').classList.add('show');
      }
    
      function closeReviewModal() {
        var el = $('reviewModalBackdrop');
        if (el) el.classList.remove('show');
      }
    
      /************************************************************
       * COPY / SEND
       ************************************************************/
      function fallbackCopy(text) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
    
        var ok = false;
        try {
          ok = document.execCommand('copy');
        } catch (e) {
          ok = false;
        }
    
        document.body.removeChild(ta);
        return ok;
      }
    
      async function copyOrderText() {
        if (!canBuildOrder()) {
          showToast('เลือกลูกค้าและสินค้าให้ครบก่อนครับ', 'warn', 1600);
          return;
        }
    
        var text = buildOrderText();
    
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            var ok = fallbackCopy(text);
            if (!ok) throw new Error('copy failed');
          }
    
          showToast('คัดลอกแล้วครับ', 'success', 1200);
    
        } catch (e) {
          var ok2 = fallbackCopy(text);
          if (ok2) {
            showToast('คัดลอกแล้วครับ', 'success', 1200);
          } else {
            showToast('คัดลอกไม่สำเร็จ กดค้างที่ข้อความเพื่อคัดลอกแทนครับ', 'error', 2400);
          }
        }
      }
    
      async function sendOrderToChat() {
        if (!canBuildOrder()) {
          showToast('เลือกลูกค้าและสินค้าให้ครบก่อนครับ', 'warn', 1600);
          return;
        }
    
        var text = buildOrderText();
    
        if (!window.liff || !LIFF_READY || !liff.isInClient()) {
          await copyOrderText();
          showToast('ส่งเข้ากลุ่มไม่ได้ในเบราว์เซอร์ จึงคัดลอกให้แทนครับ', 'warn', 2200);
          return;
        }
    
        var modalSendBtn = $('modalSendBtn');
        var oldText = modalSendBtn ? modalSendBtn.textContent : '';
    
        try {
          if (modalSendBtn) {
            modalSendBtn.disabled = true;
            modalSendBtn.textContent = 'กำลังส่ง...';
          }
    
          await liff.sendMessages([
            {
              type: 'text',
              text: text
            }
          ]);
    
          showToast('ส่งเข้ากลุ่มแล้วครับ', 'success', 1400);
    
          setTimeout(function() {
            try {
              liff.closeWindow();
            } catch (e) {}
          }, 700);
    
        } catch (e) {
          console.error(e);
          await copyOrderText();
          showToast('ส่งไม่สำเร็จ เลยคัดลอกข้อความให้แทนครับ', 'warn', 2400);
    
        } finally {
          if (modalSendBtn) {
            modalSendBtn.disabled = false;
            modalSendBtn.textContent = oldText || 'ส่งเข้ากลุ่ม';
          }
        }
      }
    
      /************************************************************
       * EVENTS
       ************************************************************/
      function bindEvents() {
        var backBtn = $('backBtn');
        var customerInput = $('customerSearch');
        var clearCustomerBtn = $('clearCustomerBtn');
        var catalogInput = $('catalogSearch');
        var copyBtn = $('copyBtn');
    
        if (backBtn) {
          backBtn.addEventListener('click', function() {
            try {
              if (window.liff && LIFF_READY && liff.isInClient()) {
                liff.closeWindow();
                return;
              }
            } catch (e) {}
    
            window.history.back();
          });
        }
    
        if (customerInput) {
          customerInput.addEventListener('focus', function() {
            var v = String(this.value || '').trim();
            if (v) {
              state.customer.dropdownOpen = true;
              renderCustomerDropdown();
            }
          });
    
          customerInput.addEventListener('input', function() {
            var v = String(this.value || '');
            state.customer.keyword = v;
    
            if (!v.trim()) {
              state.customer.selected = null;
              state.customer.options = [];
              state.customer.dropdownOpen = false;
              renderAll();
              renderCustomerDropdown();
              return;
            }
    
            state.customer.selected = null;
            state.customer.dropdownOpen = true;
            renderAll();
    
            debounce(function() {
              loadCustomers(v);
            }, 260, 'customer');
          });
        }
    
        if (clearCustomerBtn) {
          clearCustomerBtn.addEventListener('click', function() {
            state.customer.keyword = '';
            state.customer.selected = null;
            state.customer.options = [];
            state.customer.dropdownOpen = false;
    
            if (customerInput) {
              customerInput.value = '';
              customerInput.focus();
            }
    
            renderAll();
            renderCustomerDropdown();
          });
        }
    
        document.addEventListener('click', function(e) {
          var picker = document.querySelector('.customer-picker');
          if (!picker) return;
    
          if (!picker.contains(e.target)) {
            state.customer.dropdownOpen = false;
            renderCustomerDropdown();
          }
        });
    
        if (catalogInput) {
          catalogInput.addEventListener('input', function() {
            var v = String(this.value || '');
            state.catalog.keyword = v;
    
            debounce(function() {
              loadCatalog(v);
            }, 260, 'catalog');
          });
        }
    
        if (copyBtn) {
          copyBtn.addEventListener('click', openReviewModal);
        }
      }
    
      /************************************************************
       * INIT
       ************************************************************/
      async function initPage() {
        setLoading(8, 'กำลังเปิดหน้า...');
        bindEvents();
        polishStaticText();
        applyMascot();
        ensureReviewModal();
    
        try {
          await ensureLiffReady();
        } catch (e) {
          console.warn(e);
          showToast('LIFF ไม่พร้อม ใช้โหมดคัดลอกแทนได้ครับ', 'warn', 2200);
        }
    
        setLoading(48, 'กำลังโหลดข้อมูลเริ่มต้น...');
        await loadInit();
    
        setLoading(70, 'กำลังโหลดรายการสินค้า...');
        await loadCatalog('');
    
        setLoading(100, 'พร้อมใช้งานแล้ว');
    
        renderAll();
    
        setTimeout(function() {
          hideLoading();
        }, 250);
      }
    
      window.addEventListener('load', function() {
        initPage().catch(function(e) {
          console.error(e);
          showToast(e.message || 'เปิดหน้าไม่สำเร็จ', 'error', 2400);
          hideLoading();
          renderAll();
        });
      });
    </script>
</body>
</html>
