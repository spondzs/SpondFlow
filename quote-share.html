<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7fb" />
  <title>แชร์ใบเสนอราคา</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    :root {
      --bg: #f5f7fb;
      --text: #111827;
      --muted: #64748b;
      --blue: #4f6df5;
      --blue2: #7c9cff;
      --line: rgba(15, 23, 42, 0.10);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-top: env(safe-area-inset-top);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(79, 109, 245, 0.18), transparent 34%),
        radial-gradient(circle at top right, rgba(124, 156, 255, 0.16), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 58%, #eef3fb 100%);
    }

    body {
      padding: calc(18px + var(--safe-top)) 16px calc(18px + var(--safe-bottom));
      display: grid;
      place-items: center;
    }

    button,
    input {
      font-family: inherit;
    }

    .card {
      width: min(100%, 420px);
      border-radius: 30px;
      padding: 22px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(255,255,255,0.92);
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 14px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white;
      font-size: 34px;
      box-shadow: 0 14px 30px rgba(79, 109, 245, 0.24);
    }

    .title {
      margin: 0;
      text-align: center;
      font-size: 24px;
      font-weight: 950;
      letter-spacing: -0.4px;
    }

    .sub {
      margin: 7px 0 0;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
      font-weight: 700;
    }

    .quote-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: #f8fbff;
      border: 1px solid #e3ecff;
      color: #315bc8;
      font-size: 15px;
      font-weight: 950;
      text-align: center;
      word-break: break-word;
    }

    .option {
      margin-top: 14px;
      padding: 13px 14px;
      border-radius: 18px;
      border: 1px solid #e3ecff;
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #334155;
      font-size: 14px;
      font-weight: 900;
    }

    .option input {
      width: 20px;
      height: 20px;
      accent-color: var(--blue);
      flex: 0 0 auto;
    }

    .actions {
      display: grid;
      grid-template-columns: 0.9fr 1.3fr;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      min-height: 54px;
      border: 0;
      border-radius: 19px;
      font-size: 15px;
      font-weight: 950;
      cursor: pointer;
    }

    .btn.cancel {
      background: #eef2f7;
      color: #334155;
    }

    .btn.primary {
      background:
        radial-gradient(circle at 92% 0%, rgba(255,255,255,0.24), transparent 30%),
        linear-gradient(135deg, var(--blue), var(--blue2));
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(79, 109, 245, 0.22);
    }

    .btn:disabled {
      opacity: 0.58;
      box-shadow: none;
    }

    .status {
      min-height: 20px;
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      line-height: 1.45;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .loading.show {
      display: flex;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(79, 109, 245, 0.16);
      border-top-color: var(--blue);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="icon">🔗</div>

    <h1 class="title">แชร์ใบเสนอราคา</h1>
    <p class="sub">เลือกได้ว่าจะส่งช่องทางชำระเงินไปพร้อมกันไหมครับ</p>

    <div id="quoteNoBox" class="quote-box">-</div>

    <label class="option">
      <input id="includePaymentInfo" type="checkbox" checked />
      <span>แนบช่องทางชำระเงิน</span>
    </label>

    <div class="actions">
      <button id="cancelBtn" class="btn cancel" type="button">ยกเลิก</button>
      <button id="shareBtn" class="btn primary" type="button">แชร์ให้ลูกค้า</button>
    </div>

    <div id="status" class="status">
      <span id="loadingIcon" class="loading">
        <span class="spinner"></span>
        <span id="loadingText">กำลังเตรียมระบบ...</span>
      </span>
      <span id="plainStatus">พร้อมแชร์ครับ</span>
    </div>
  </main>

  <script>
    const CONFIG = {
      liffId: "ใส่_LIFF_ID_ของหน้า_quote_share_ตรงนี้",
      gasApiUrl: "https://script.google.com/macros/s/AKfycbw4jAzjWors_9dwQx1bI2RpVzm56icKOcTDYutQZIindgZb3f67MqoduccqgFnM6TzgaA/exec"
    };

    let LIFF_READY = false;
    let LINE_USER_ID = "";
    let ID_TOKEN = "";

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      const quoteNo = getQuoteNo_();

      $("quoteNoBox").textContent = quoteNo || "ไม่พบเลขใบเสนอราคา";

      $("cancelBtn").onclick = closeLiff_;
      $("shareBtn").onclick = function() {
        shareQuote_(quoteNo);
      };

      if (!quoteNo) {
        setStatus_("ไม่พบ quoteNo ใน URL", false);
        $("shareBtn").disabled = true;
        return;
      }

      try {
        setStatus_("กำลังเชื่อมต่อ LINE...", true);

        await liff.init({
          liffId: CONFIG.liffId
        });

        if (!liff.isLoggedIn()) {
          liff.login({
            redirectUri: window.location.href
          });
          return;
        }

        const profile = await liff.getProfile();
        LINE_USER_ID = String(profile && profile.userId || "").trim();

        try {
          ID_TOKEN = String(liff.getIDToken() || "").trim();
        } catch (e) {
          ID_TOKEN = "";
        }

        LIFF_READY = true;

        setStatus_("พร้อมแชร์ครับ", false);

      } catch (err) {
        console.error("[init]", err);
        setStatus_(err && err.message ? err.message : "เปิด LIFF ไม่สำเร็จ", false);
        $("shareBtn").disabled = true;
      }
    }

    function getQuoteNo_() {
      try {
        const params = new URLSearchParams(window.location.search || "");
        return String(
          params.get("quoteNo") ||
          params.get("quote") ||
          params.get("po") ||
          ""
        ).trim();
      } catch (err) {
        return "";
      }
    }

    async function shareQuote_(quoteNo) {
      quoteNo = String(quoteNo || "").trim();

      if (!quoteNo) {
        setStatus_("ไม่พบเลขใบเสนอราคา", false);
        return;
      }

      if (!LIFF_READY || !window.liff) {
        setStatus_("LIFF ยังไม่พร้อม", false);
        return;
      }

      if (!liff.isInClient()) {
        setStatus_("กรุณาเปิดผ่าน LINE", false);
        return;
      }

      if (
        typeof liff.shareTargetPicker !== "function" ||
        (
          typeof liff.isApiAvailable === "function" &&
          !liff.isApiAvailable("shareTargetPicker")
        )
      ) {
        setStatus_("อุปกรณ์นี้ยังไม่รองรับ SharePicker", false);
        return;
      }

      const includePaymentInfo = $("includePaymentInfo").checked !== false;
      const btn = $("shareBtn");
      const cancelBtn = $("cancelBtn");

      try {
        btn.disabled = true;
        cancelBtn.disabled = true;
        btn.textContent = "กำลังโหลด...";

        setStatus_("กำลังโหลดใบเสนอราคา...", true);

        const messages = await callGasJsonp({
          action: "get_quote_share_payload",
          quoteNo: quoteNo,
          lineUserId: LINE_USER_ID,
          idToken: ID_TOKEN,
          includePaymentInfo: includePaymentInfo ? "1" : "0"
        });

        if (messages && messages.ok === false) {
          throw new Error(messages.error || messages.message || "โหลด payload ไม่สำเร็จ");
        }

        if (!Array.isArray(messages) || !messages.length) {
          throw new Error("GAS ไม่ได้ส่ง messages กลับมา");
        }

        setStatus_("กำลังเปิดรายชื่อผู้รับ...", true);

        const result = await liff.shareTargetPicker(messages, {
          isMultiple: true
        });

        if (result && (result.status === "success" || result === true)) {
          setStatus_("แชร์เรียบร้อยครับ ✅", false);

          setTimeout(closeLiff_, 700);
          return;
        }

        setStatus_("ยกเลิกการแชร์ครับ", false);

      } catch (err) {
        console.error("[shareQuote_]", err);
        setStatus_(err && err.message ? err.message : "แชร์ไม่สำเร็จ", false);

      } finally {
        btn.disabled = false;
        cancelBtn.disabled = false;
        btn.textContent = "แชร์ให้ลูกค้า";
      }
    }

    function callGasJsonp(params) {
      return new Promise(function(resolve, reject) {
        const callbackName =
          "__quoteShare_" + Date.now() + "_" + Math.floor(Math.random() * 100000);

        const query = new URLSearchParams(params || {});
        query.set("callback", callbackName);

        const script = document.createElement("script");
        script.src = CONFIG.gasApiUrl + "?" + query.toString();

        const timer = setTimeout(function() {
          cleanup();
          reject(new Error("GAS request timeout"));
        }, 15000);

        function cleanup() {
          clearTimeout(timer);

          try {
            delete window[callbackName];
          } catch (_) {
            window[callbackName] = undefined;
          }

          if (script && script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = function(data) {
          cleanup();
          resolve(data);
        };

        script.onerror = function() {
          cleanup();
          reject(new Error("GAS script load failed"));
        };

        document.body.appendChild(script);
      });
    }

    function setStatus_(text, loading) {
      const loadingIcon = $("loadingIcon");
      const plainStatus = $("plainStatus");
      const loadingText = $("loadingText");

      if (loadingIcon) {
        loadingIcon.classList.toggle("show", !!loading);
      }

      if (plainStatus) {
        plainStatus.style.display = loading ? "none" : "";
        plainStatus.textContent = text || "";
      }

      if (loadingText) {
        loadingText.textContent = text || "กำลังโหลด...";
      }
    }

    function closeLiff_() {
      try {
        if (window.liff && typeof liff.isInClient === "function" && liff.isInClient()) {
          liff.closeWindow();
          return;
        }
      } catch (e) {}

      try {
        window.close();
      } catch (e) {}

      setStatus_("ปิดหน้านี้จากปุ่ม X ได้เลยครับ", false);
    }

    function $(id) {
      return document.getElementById(id);
    }
  </script>
</body>
</html>
